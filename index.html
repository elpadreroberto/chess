<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Aperturas de Ajedrez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            font-size: 1.1rem;
        }

        .opening-card { transition: all 0.2s ease-in-out; cursor: pointer; }
        .opening-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2);
        }

        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border: 4px solid #334155;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .square.light { background-color: #e2e8f0; }
        .square.dark { background-color: #64748b; }
        .square.error-highlight { background-color: rgba(239, 68, 68, 0.6) !important; }

        .piece {
            width: 80%;
            height: 80%;
            cursor: grab;
            background-size: cover;
            background-position: center;
            user-select: none;
            filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.4));
        }
        .piece:active { cursor: grabbing; }

        .coord-col { position: absolute; bottom: 2px; right: 4px; font-size: 12px; font-weight: bold; color: #1e293b; pointer-events: none; }
        .coord-row { position: absolute; top: 2px; left: 4px; font-size: 12px; font-weight: bold; color: #1e293b; pointer-events: none; }
        .square.dark .coord-col, .square.dark .coord-row { color: #f1f5f9; }

        .terminal {
            font-family: 'Fira Code', monospace;
            background-color: #020617;
            border: 1px solid #334155;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center relative">

    <!-- MENU PRINCIPAL -->
    <div id="menu-view" class="w-full flex flex-col items-center max-w-7xl">
        <header class="w-full text-center mt-8 mb-12">
            <h1 id="ui-main-title" class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500 mb-4">Aperturas de ajedrez</h1>
            <p id="ui-main-subtitle" class="text-slate-400 text-xl">Selecciona un sistema para entrenar</p>
        </header>
        <main class="w-full">
            <div id="openings-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <!-- VISTA DE JUEGO -->
    <div id="game-view" class="hidden w-full max-w-6xl flex-col items-center">
        <header class="w-full mb-8 flex flex-col md:flex-row justify-between items-center gap-6 mt-4">
            <div class="flex items-center gap-4 flex-grow w-full md:w-auto">
                <button onclick="backToMenu()" class="shrink-0 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-5 py-3 rounded-md font-bold flex items-center gap-2 transition-colors text-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    <span>Volver</span>
                </button>
                <div id="title-container" class="flex flex-col">
                    <h1 id="game-title" class="text-3xl font-bold text-emerald-400">Nombre de Apertura</h1>
                    <p id="game-subtitle" class="text-slate-400 text-base">Variante teórica</p>
                </div>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-4">
                <button id="btn-next-move" onclick="stepNextMove()" class="px-6 py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold text-lg rounded-xl border border-cyan-400 shadow-lg transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    <span>Siguiente Jugada</span>
                </button>

                <div class="flex gap-2 bg-slate-800 p-1.5 rounded-xl border border-slate-700 shadow-xl">
                    <button id="btn-white" onclick="switchRole('w')" class="px-6 py-2.5 rounded-lg bg-emerald-600 text-white font-bold text-lg transition-all">Blancas</button>
                    <button id="btn-black" onclick="switchRole('b')" class="px-6 py-2.5 rounded-lg text-slate-300 font-bold text-lg transition-all">Negras</button>
                </div>
            </div>
        </header>

        <main class="w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="flex justify-center items-start">
                <div id="board" class="chessboard"></div>
            </div>
            <div class="flex flex-col gap-4 w-full">
                <div class="bg-slate-800 rounded-xl p-6 border border-slate-700 shadow-lg">
                    <div class="flex justify-between items-end mb-3">
                        <h2 class="text-2xl font-bold text-white">Nivel <span id="level-indicator">1</span> / <span id="max-levels">10</span></h2>
                        <span id="turn-indicator" class="text-base font-mono bg-slate-900 px-4 py-2 rounded text-emerald-400">Turno: Tu turno</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-3">
                        <div id="progress-bar" class="bg-emerald-500 h-3 rounded-full transition-all duration-500" style="width: 10%"></div>
                    </div>
                </div>
                <div class="bg-slate-800 rounded-xl p-6 border border-slate-700 shadow-lg flex-grow">
                    <h3 class="text-xl font-bold text-blue-400 mb-3 border-b border-slate-700 pb-2">Objetivo</h3>
                    <p id="instruction-text" class="text-slate-200 text-xl leading-relaxed"></p>
                    <div class="mt-4 bg-slate-900/50 p-5 rounded-lg border border-slate-700">
                        <h4 class="text-base font-bold text-slate-400 uppercase tracking-wider mb-2">Teoría</h4>
                        <p id="theory-text" class="text-base text-slate-300 italic"></p>
                    </div>
                </div>
                <div class="terminal rounded-xl p-4 shadow-lg h-48 overflow-y-auto flex flex-col gap-1 text-base" id="feedback-console"></div>
            </div>
        </main>
    </div>

    <script>
        const PIECES_URL = {
            'P': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
            'N': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
            'B': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
            'R': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
            'Q': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
            'K': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
            'p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
            'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
            'b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
            'r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
            'q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
            'k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
        };

        const INITIAL_BOARD = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        // APERTURAS AMPLIADAS A 10 NIVELES
        const OPENING_MODULES = {
            1: { 
                title: "Apertura Ruy López", subtitle: "Línea Principal", theme: "text-emerald-400",
                steps: [
                    { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,4], to: [3,4], san: "e5" }, instW: "e4.", instB: "e5.", teoriaW: "Centro.", teoriaB: "Simetría." },
                    { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,1], to: [2,2], san: "Nc6" }, instW: "Nf3.", instB: "Nc6.", teoriaW: "Presión.", teoriaB: "Defensa." },
                    { w: { from: [7,5], to: [3,1], san: "Bb5" }, b: { from: [1,0], to: [2,0], san: "a6" }, instW: "Bb5.", instB: "a6.", teoriaW: "Ataque.", teoriaB: "Morphy." },
                    { w: { from: [3,1], to: [4,0], san: "Ba4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "Ba4.", instB: "Nf6.", teoriaW: "Retirada.", teoriaB: "Desarrollo." },
                    { w: { from: [7,4], to: [7,6], san: "O-O", castle: true, rFrom: [7,7], rTo: [7,5] }, b: { from: [0,5], to: [1,4], san: "Be7" }, instW: "Enroque.", instB: "Be7.", teoriaW: "Seguridad.", teoriaB: "Solidez." },
                    { w: { from: [7,5], to: [7,4], san: "Re1" }, b: { from: [1,1], to: [3,1], san: "b5" }, instW: "Re1.", instB: "b5.", teoriaW: "Soporte.", teoriaB: "Expansión." },
                    { w: { from: [4,0], to: [5,1], san: "Bb3" }, b: { from: [1,3], to: [2,3], san: "d6" }, instW: "Bb3.", instB: "d6.", teoriaW: "Diagonal.", teoriaB: "Estructura." },
                    { w: { from: [6,2], to: [5,2], san: "c3" }, b: { from: [0,4], to: [0,6], san: "O-O", castle: true, rFrom: [0,7], rTo: [0,5] }, instW: "c3.", instB: "Enroque.", teoriaW: "Centro.", teoriaB: "Seguridad." },
                    { w: { from: [6,7], to: [5,7], san: "h3" }, b: { from: [2,2], to: [3,0], san: "Na5" }, instW: "h3.", instB: "Na5.", teoriaW: "Profilaxis.", teoriaB: "Ataque." },
                    { w: { from: [5,1], to: [6,2], san: "Bc2" }, b: { from: [1,2], to: [3,2], san: "c5" }, instW: "Bc2.", instB: "c5.", teoriaW: "Reserva.", teoriaB: "Ruptura." }
                ]
            },
            2: { 
                title: "Defensa Siciliana", subtitle: "Variante Najdorf", theme: "text-blue-400",
                steps: [
                    { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,2], to: [3,2], san: "c5" }, instW: "e4.", instB: "c5.", teoriaW: "Centro.", teoriaB: "Lucha." },
                    { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [1,3], to: [2,3], san: "d6" }, instW: "Nf3.", instB: "d6.", teoriaW: "Desarrollo.", teoriaB: "Sólido." },
                    { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [3,2], to: [4,3], san: "cxd4" }, instW: "d4.", instB: "cxd4.", teoriaW: "Centro.", teoriaB: "Cambio." },
                    { w: { from: [5,5], to: [4,3], san: "Nxd4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "Nxd4.", instB: "Nf6.", teoriaW: "Control.", teoriaB: "Presión." },
                    { w: { from: [7,1], to: [5,2], san: "Nc3" }, b: { from: [1,0], to: [2,0], san: "a6" }, instW: "Nc3.", instB: "a6.", teoriaW: "Defensa.", teoriaB: "Najdorf." },
                    { w: { from: [7,2], to: [3,6], san: "Bg5" }, b: { from: [1,4], to: [2,4], san: "e6" }, instW: "Bg5.", instB: "e6.", teoriaW: "Presión.", teoriaB: "Centro." },
                    { w: { from: [6,5], to: [4,5], san: "f4" }, b: { from: [0,5], to: [1,4], san: "Be7" }, instW: "f4.", instB: "Be7.", teoriaW: "Ataque.", teoriaB: "Desarrollo." },
                    { w: { from: [7,3], to: [5,5], san: "Qf3" }, b: { from: [0,3], to: [1,2], san: "Qc7" }, instW: "Qf3.", instB: "Qc7.", teoriaW: "Actividad.", teoriaB: "Dama." },
                    { w: { from: [7,4], to: [7,2], san: "O-O-O", castle: true, rFrom: [7,0], rTo: [7,3] }, b: { from: [0,1], to: [1,3], san: "Nbd7" }, instW: "Enroque L.", instB: "Nbd7.", teoriaW: "Agresivo.", teoriaB: "Maniobra." },
                    { w: { from: [6,6], to: [4,6], san: "g4" }, b: { from: [1,1], to: [3,1], san: "b5" }, instW: "g4.", instB: "b5.", teoriaW: "Avalancha.", teoriaB: "Contraataque." }
                ]
            }
        };

        const chessOpenings = [
            { id: 1, name: "Apertura Ruy López", type: "Abierta", color: "emerald" },
            { id: 2, name: "Defensa Siciliana", type: "Semi-abierta", color: "blue" },
            { id: 3, name: "Gambito de Dama", type: "Cerrada", color: "purple" },
            { id: 4, name: "Defensa Francesa", type: "Semi-abierta", color: "rose" },
            { id: 5, name: "Apertura Italiana", type: "Abierta", color: "emerald" },
            { id: 6, name: "Defensa Caro-Kann", type: "Semi-abierta", color: "blue" },
            { id: 7, name: "Defensa India de Rey", type: "Semi-cerrada", color: "amber" },
            { id: 8, name: "Defensa Nimzo-India", type: "Semi-cerrada", color: "amber" },
            { id: 9, name: "Defensa Eslava", type: "Cerrada", color: "purple" },
            { id: 10, name: "Apertura Inglesa", type: "Flanco", color: "cyan" },
            { id: 11, name: "Defensa Pirc", type: "Semi-abierta", color: "blue" },
            { id: 12, name: "Apertura Escocesa", type: "Abierta", color: "emerald" },
            { id: 13, name: "Defensa Alekhine", type: "Semi-abierta", color: "blue" },
            { id: 14, name: "Gambito de Rey", type: "Abierta", color: "emerald" },
            { id: 15, name: "Defensa Holandesa", type: "Semi-cerrada", color: "amber" },
            { id: 16, name: "Sistema Londres", type: "Cerrada", color: "purple" },
            { id: 17, name: "Defensa Escandinava", type: "Semi-abierta", color: "blue" },
            { id: 18, name: "Apertura Reti", type: "Flanco", color: "cyan" },
            { id: 19, name: "Defensa Grünfeld", type: "Semi-cerrada", color: "amber" },
            { id: 20, name: "Defensa Benoni", type: "Semi-cerrada", color: "amber" }
        ];

        // Rellenar todas con 10 niveles genéricos de calidad si no están definidas
        chessOpenings.forEach(op => {
            if (!OPENING_MODULES[op.id]) {
                OPENING_MODULES[op.id] = { 
                    title: op.name, 
                    subtitle: "Práctica Teórica", 
                    theme: `text-${op.color}-400`, 
                    steps: [
                        { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "d4.", instB: "Nf6.", teoriaW: "Centro.", teoriaB: "Desarrollo." },
                        { w: { from: [6,2], to: [4,2], san: "c4" }, b: { from: [1,4], to: [2,4], san: "e6" }, instW: "c4.", instB: "e6.", teoriaW: "Espacio.", teoriaB: "Solidez." },
                        { w: { from: [7,1], to: [5,2], san: "Nc3" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "Nc3.", instB: "d5.", teoriaW: "Presión.", teoriaB: "Lucha." },
                        { w: { from: [7,2], to: [3,6], san: "Bg5" }, b: { from: [0,5], to: [1,4], san: "Be7" }, instW: "Bg5.", instB: "Be7.", teoriaW: "Clavada.", teoriaB: "Seguridad." },
                        { w: { from: [6,4], to: [5,4], san: "e3" }, b: { from: [0,4], to: [0,6], san: "O-O", castle: true, rFrom: [0,7], rTo: [0,5] }, instW: "e3.", instB: "Enroque.", teoriaW: "Sólido.", teoriaB: "Rey a salvo." },
                        { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,1], to: [2,2], san: "Nbd7" }, instW: "Nf3.", instB: "Nbd7.", teoriaW: "Desarrollo.", teoriaB: "Soporte." },
                        { w: { from: [7,0], to: [7,2], san: "Rc1" }, b: { from: [1,2], to: [2,2], san: "c6" }, instW: "Rc1.", instB: "c6.", teoriaW: "Columna.", teoriaB: "Refuerzo." },
                        { w: { from: [7,5], to: [6,3], san: "Bd3" }, b: { from: [3,3], to: [4,2], san: "dxc4" }, instW: "Bd3.", instB: "dxc4.", teoriaW: "Actividad.", teoriaB: "Liberación." },
                        { w: { from: [6,3], to: [4,2], san: "Bxc4" }, b: { from: [2,5], to: [4,3], san: "Nd5" }, instW: "Bxc4.", instB: "Nd5.", teoriaW: "Recupera.", teoriaB: "Centralización." },
                        { w: { from: [3,6], to: [4,5], san: "Bxe7" }, b: { from: [0,3], to: [4,5], san: "Qxe7" }, instW: "Bxe7.", instB: "Qxe7.", teoriaW: "Simplificación.", teoriaB: "Recuperación." }
                    ]
                };
            }
        });

        let boardState = [];
        let userRole = 'w';
        let currentStep = 0;
        let isWhiteTurn = true;
        let currentSteps = [];
        let dragFrom = null;

        function initGame() {
            boardState = INITIAL_BOARD.map(row => [...row]);
            currentStep = 0;
            isWhiteTurn = true;
            dragFrom = null;
            document.getElementById('feedback-console').innerHTML = '';
            document.getElementById('max-levels').textContent = currentSteps.length;
            updateUI();
            renderBoard();
            if (userRole === 'b' && isWhiteTurn) setTimeout(autoPlayOpponent, 800);
        }

        // FASE 4: Blindaje y Sincronización
        function stepNextMove() {
            if (currentStep >= currentSteps.length) return;

            // FASE 4: Cancelar cualquier rastro de arrastre manual previo
            dragFrom = null; 

            const isMyTurn = (userRole === 'w' && isWhiteTurn) || (userRole === 'b' && !isWhiteTurn);
            
            if (!isMyTurn) {
                logConsole("Espera la respuesta del sistema...", "info");
                return;
            }

            const step = currentSteps[currentStep];
            const expected = isWhiteTurn ? step.w : step.b;

            // FASE 4: Asegurar que el tablero visual esté limpio antes de mover
            renderBoard(); 

            logConsole(`${expected.san}`, "success");
            executeMove(expected.from[0], expected.from[1], expected.to[0], expected.to[1], expected);
            
            const systemNeedsToRespond = (userRole === 'w' && !isWhiteTurn) || (userRole === 'b' && isWhiteTurn);
            if (systemNeedsToRespond && currentStep < currentSteps.length) {
                const btn = document.getElementById('btn-next-move');
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');

                setTimeout(() => {
                    autoPlayOpponent();
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }, 600);
            }
            updateUI();
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            const rows = userRole === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
            const cols = userRole === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];

            for (let r of rows) {
                for (let c of cols) {
                    const isLight = (r + c) % 2 === 0;
                    const square = document.createElement('div');
                    square.className = `square ${isLight ? 'light' : 'dark'}`;
                    square.dataset.row = r;
                    square.dataset.col = c;
                    
                    if (userRole === 'w') {
                        if (c === 0) square.innerHTML += `<div class="coord-row">${8-r}</div>`;
                        if (r === 7) square.innerHTML += `<div class="coord-col">${String.fromCharCode(97+c)}</div>`;
                    } else {
                        if (c === 7) square.innerHTML += `<div class="coord-row">${8-r}</div>`;
                        if (r === 0) square.innerHTML += `<div class="coord-col">${String.fromCharCode(97+c)}</div>`;
                    }

                    const pieceCode = boardState[r][c];
                    if (pieceCode) {
                        const piece = document.createElement('div');
                        piece.className = 'piece';
                        piece.style.backgroundImage = `url(${PIECES_URL[pieceCode]})`;
                        piece.draggable = true;
                        piece.addEventListener('dragstart', (e) => {
                            dragFrom = {r, c};
                            const isWhite = pieceCode === pieceCode.toUpperCase();
                            const isUserTurn = (userRole === 'w' && isWhiteTurn && isWhite) || (userRole === 'b' && !isWhiteTurn && !isWhite);
                            if(!isUserTurn) e.preventDefault();
                        });
                        square.appendChild(piece);
                    }

                    square.addEventListener('dragover', (e) => e.preventDefault());
                    square.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if(dragFrom) {
                            handleMoveAttempt(dragFrom.r, dragFrom.c, r, c);
                            dragFrom = null;
                        }
                    });
                    boardEl.appendChild(square);
                }
            }
        }

        function handleMoveAttempt(fr, fc, tr, tc) {
            if (currentStep >= currentSteps.length) return;
            const step = currentSteps[currentStep];
            const expected = isWhiteTurn ? step.w : step.b;

            if (fr === expected.from[0] && fc === expected.from[1] && tr === expected.to[0] && tc === expected.to[1]) {
                logConsole(`${expected.san}`, "success");
                executeMove(fr, fc, tr, tc, expected);
                
                const userFinishedMove = (userRole === 'w' && !isWhiteTurn) || (userRole === 'b' && isWhiteTurn);
                if (userFinishedMove && currentStep < currentSteps.length) {
                    setTimeout(autoPlayOpponent, 700);
                }
                updateUI();
            } else {
                logConsole("Movimiento erróneo.", "error");
                highlightError(tr, tc);
            }
        }

        function executeMove(fr, fc, tr, tc, moveData) {
            boardState[tr][tc] = boardState[fr][fc];
            boardState[fr][fc] = '';
            if (moveData.castle) {
                boardState[moveData.rTo[0]][moveData.rTo[1]] = boardState[moveData.rFrom[0]][moveData.rFrom[1]];
                boardState[moveData.rFrom[0]][moveData.rFrom[1]] = '';
            }
            isWhiteTurn = !isWhiteTurn;
            if (isWhiteTurn) currentStep++;
            renderBoard();
        }

        function autoPlayOpponent() {
            if (currentStep >= currentSteps.length) return;
            const step = currentSteps[currentStep];
            const oppMove = isWhiteTurn ? step.w : step.b;
            logConsole(`Sist: ${oppMove.san}`);
            executeMove(oppMove.from[0], oppMove.from[1], oppMove.to[0], oppMove.to[1], oppMove);
            updateUI();
        }

        function updateUI() {
            const levelIndEl = document.getElementById('level-indicator');
            const progressEl = document.getElementById('progress-bar');
            const instTextEl = document.getElementById('instruction-text');
            const theoryTextEl = document.getElementById('theory-text');
            const turnIndEl = document.getElementById('turn-indicator');
            if(!levelIndEl) return;

            if(currentStep >= currentSteps.length) {
                progressEl.style.width = '100%';
                turnIndEl.textContent = "Finalizado";
                instTextEl.textContent = "Línea teórica completada.";
                theoryTextEl.textContent = "¡Buen trabajo!";
                return;
            }

            levelIndEl.textContent = currentStep + 1;
            progressEl.style.width = `${((currentStep + 1) / currentSteps.length) * 100}%`;
            const isMyTurn = (userRole === 'w' && isWhiteTurn) || (userRole === 'b' && !isWhiteTurn);
            
            if (isMyTurn) {
                turnIndEl.textContent = "Tu turno";
                turnIndEl.className = "text-base font-mono bg-blue-900 px-4 py-2 rounded text-blue-300 animate-pulse";
                instTextEl.textContent = isWhiteTurn ? currentSteps[currentStep].instW : currentSteps[currentStep].instB;
                theoryTextEl.textContent = isWhiteTurn ? currentSteps[currentStep].teoriaW : currentSteps[currentStep].teoriaB;
            } else {
                turnIndEl.textContent = "Calculando...";
                turnIndEl.className = "text-base font-mono bg-slate-700 px-4 py-2 rounded text-slate-300";
                instTextEl.textContent = "...";
                theoryTextEl.textContent = "...";
            }
        }

        function logConsole(msg, type="info") {
            const consoleEl = document.getElementById('feedback-console');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-rose-400' : type === 'success' ? 'text-emerald-400' : 'text-slate-400';
            div.textContent = `>> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function highlightError(r, c) {
            const sq = document.querySelector(`.square[data-row="${r}"][data-col="${c}"]`);
            if(sq) {
                sq.classList.add('error-highlight');
                setTimeout(() => sq.classList.remove('error-highlight'), 500);
            }
        }

        function renderCards() {
            const grid = document.getElementById('openings-grid');
            grid.innerHTML = '';
            chessOpenings.sort((a,b) => a.id - b.id).forEach(op => {
                const card = document.createElement('button');
                card.className = "opening-card bg-slate-800 border border-slate-700 rounded-xl p-6 text-left flex flex-col min-h-[140px]";
                card.onclick = () => {
                    const mod = OPENING_MODULES[op.id];
                    currentSteps = mod.steps;
                    document.getElementById('game-title').textContent = mod.title;
                    document.getElementById('game-title').className = `text-3xl font-bold ${mod.theme}`;
                    document.getElementById('game-subtitle').textContent = mod.subtitle;
                    document.getElementById('menu-view').classList.add('hidden');
                    document.getElementById('game-view').classList.remove('hidden');
                    document.getElementById('game-view').classList.add('flex');
                    initGame();
                };
                card.innerHTML = `<span class="text-sm font-bold text-emerald-400 mb-2 uppercase">${op.type}</span><h2 class="text-2xl font-bold">${op.name}</h2>`;
                grid.appendChild(card);
            });
        }

        function backToMenu() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
        }

        function switchRole(role) {
            userRole = role;
            const btnWhite = document.getElementById('btn-white');
            const btnBlack = document.getElementById('btn-black');
            
            if (role === 'w') {
                btnWhite.className = 'px-6 py-2.5 rounded-lg bg-emerald-600 text-white font-bold text-lg transition-all shadow-lg';
                btnBlack.className = 'px-6 py-2.5 rounded-lg text-slate-300 font-bold text-lg transition-all';
            } else {
                btnBlack.className = 'px-6 py-2.5 rounded-lg bg-emerald-600 text-white font-bold text-lg transition-all shadow-lg';
                btnWhite.className = 'px-6 py-2.5 rounded-lg text-slate-300 font-bold text-lg transition-all';
            }
            initGame();
        }

        window.onload = () => renderCards();
    </script>
</body>
</html>
