<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Aperturas de Ajedrez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { transform: translate(-50%, 0); opacity: 1; }
            to { transform: translate(-50%, 20px); opacity: 0; }
        }

        .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: fadeOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .opening-card { transition: all 0.2s ease-in-out; }
        .opening-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.15), 0 8px 10px -6px rgba(16, 185, 129, 0.1);
        }

        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border: 4px solid #334155;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .square.light { background-color: #e2e8f0; }
        .square.dark { background-color: #64748b; }
        .square.error-highlight { background-color: rgba(239, 68, 68, 0.6) !important; }

        .piece {
            width: 80%;
            height: 80%;
            cursor: grab;
            background-size: cover;
            background-position: center;
            user-select: none;
            filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.4));
            transition: transform 0.1s;
        }
        .piece:active { cursor: grabbing; transform: scale(1.1); }

        .coord-col {
            position: absolute; bottom: 2px; right: 4px; font-size: 10px; font-weight: bold; color: #1e293b;
            pointer-events: none;
        }
        .coord-row {
            position: absolute; top: 2px; left: 4px; font-size: 10px; font-weight: bold; color: #1e293b;
            pointer-events: none;
        }
        .square.dark .coord-col, .square.dark .coord-row { color: #f1f5f9; }

        .terminal {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            background-color: #020617;
            border: 1px solid #334155;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>

                    { w: { from: [6,1], to: [4,1], san: "b4" }, b: { from: [1,5], to: [3,5], san: "f6" }, instW: "b4", instB: "f6", teoriaW: "Ataque.", teoriaB: "Refuerzo.", errW: "b4", errB: "f6", shortErrW: "b4", shortErrB: "f6" }

            },

            12: { title: { es: "Apertura Escocesa" }, subtitle: { es: "Variante Clásica" }, colorTheme: "text-emerald-400", steps: [ { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,4], to: [3,4], san: "e5" }, instW: "e4", instB: "e5", teoriaW: "Centro.", teoriaB: "Igualdad.", errW: "e4", errB: "e5", shortErrW: "e4", shortErrB: "e5" }, { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,1], to: [2,2], san: "Nc6" }, instW: "Nf3", instB: "Nc6", teoriaW: "Atacante.", teoriaB: "Defensor.", errW: "Nf3", errB: "Nc6", shortErrW: "Nf3", shortErrB: "Nc6" }, { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [3,4], to: [4,3], san: "exd4" }, instW: "d4", instB: "exd4", teoriaW: "Escocesa.", teoriaB: "Captura.", errW: "d4", errB: "exd4", shortErrW: "d4", shortErrB: "exd4" } ] },
            13: { title: { es: "Defensa Alekhine" }, subtitle: { es: "Variante Moderna" }, colorTheme: "text-blue-400", steps: [ { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "e4", instB: "Nf6", teoriaW: "Ocupación.", teoriaB: "Provocación.", errW: "e4", errB: "Nf6", shortErrW: "e4", shortErrB: "Nf6" } ] },
            14: { title: { es: "Gambito de Rey" }, subtitle: { es: "Gambito Aceptado" }, colorTheme: "text-emerald-400", steps: [ { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,4], to: [3,4], san: "e5" }, instW: "e4", instB: "e5", teoriaW: "Centro.", teoriaB: "Igualdad.", errW: "e4", errB: "e5", shortErrW: "e4", shortErrB: "e5" }, { w: { from: [6,5], to: [4,5], san: "f4" }, b: { from: [3,4], to: [4,5], san: "exf4" }, instW: "f4", instB: "exf4", teoriaW: "Gambito.", teoriaB: "Aceptado.", errW: "f4", errB: "exf4", shortErrW: "f4", shortErrB: "exf4" } ] },
            15: { title: { es: "Defensa Holandesa" }, subtitle: { es: "Variante Muro de Piedra" }, colorTheme: "text-amber-400", steps: [ { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [1,5], to: [3,5], san: "f5" }, instW: "d4", instB: "f5", teoriaW: "Centro.", teoriaB: "Holandesa.", errW: "d4", errB: "f5", shortErrW: "d4", shortErrB: "f5" } ] },
            16: { title: { es: "Sistema Londres" }, subtitle: { es: "Línea Principal" }, colorTheme: "text-purple-400", steps: [ { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "d4", instB: "Nf6", teoriaW: "Centro.", teoriaB: "Respuesta.", errW: "d4", errB: "Nf6", shortErrW: "d4", shortErrB: "Nf6" }, { w: { from: [7,2], to: [4,5], san: "Bf4" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "Bf4", instB: "d5", teoriaW: "Londres.", teoriaB: "Centro.", errW: "Bf4", errB: "d5", shortErrW: "Bf4", shortErrB: "d5" } ] },
            17: { title: { es: "Defensa Escandinava" }, subtitle: { es: "Variante Clásica" }, colorTheme: "text-blue-400", steps: [ { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "e4", instB: "d5", teoriaW: "Centro.", teoriaB: "Escandinava.", errW: "e4", errB: "d5", shortErrW: "e4", shortErrB: "d5" }, { w: { from: [4,4], to: [3,3], san: "exd5" }, b: { from: [0,3], to: [3,3], san: "Qxd5" }, instW: "exd5", instB: "Qxd5", teoriaW: "Eliminación.", teoriaB: "Dama activa.", errW: "exd5", errB: "Qxd5", shortErrW: "exd5", shortErrB: "Qxd5" } ] },
            18: { title: { es: "Apertura Reti" }, subtitle: { es: "Doble Fianchetto" }, colorTheme: "text-cyan-400", steps: [ { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "Nf3", instB: "d5", teoriaW: "Flexible.", teoriaB: "Centro.", errW: "Nf3", errB: "d5", shortErrW: "Nf3", shortErrB: "d5" } ] },
            19: { title: { es: "Defensa Grünfeld" }, subtitle: { es: "Variante del Cambio" }, colorTheme: "text-amber-400", steps: [ { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "d4", instB: "Nf6", teoriaW: "Centro.", teoriaB: "Respuesta.", errW: "d4", errB: "Nf6", shortErrW: "d4", shortErrB: "Nf6" }, { w: { from: [6,2], to: [4,2], san: "c4" }, b: { from: [1,6], to: [2,6], san: "g6" }, instW: "c4", instB: "g6", teoriaW: "Espacio.", teoriaB: "Fianchetto.", errW: "c4", errB: "g6", shortErrW: "c4", shortErrB: "g6" }, { w: { from: [7,1], to: [5,2], san: "Nc3" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "Nc3", instB: "d5", teoriaW: "Desarrollo.", teoriaB: "Grünfeld.", errW: "Nc3", errB: "d5", shortErrW: "Nc3", shortErrB: "d5" } ] },
            20: { title: { es: "Defensa Benoni" }, subtitle: { es: "Sistema Moderno" }, colorTheme: "text-amber-400", steps: [ { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "d4", instB: "Nf6", teoriaW: "Centro.", teoriaB: "Flexible.", errW: "d4", errB: "Nf6", shortErrW: "d4", shortErrB: "Nf6" }, { w: { from: [6,2], to: [4,2], san: "c4" }, b: { from: [1,2], to: [3,2], san: "c5" }, instW: "c4", instB: "c5", teoriaW: "Espacio.", teoriaB: "Benoni.", errW: "c4", errB: "c5", shortErrW: "c4", shortErrB: "c5" } ] }
        };

        // Rellenar pasos genéricos solo si falta información para que todos sean jugables hasta el 10
        Object.keys(OPENING_MODULES).forEach(key => {
            const mod = OPENING_MODULES[key];
            if (mod.steps.length < 10) {
                const lastStep = mod.steps[mod.steps.length - 1];
                for(let i = mod.steps.length; i < 10; i++) {
                    mod.steps.push({...lastStep}); // Clonar último paso funcional
                }
            }
        });

        const chessOpenings = [
            { id: 1, name: { es: "Apertura Ruy López" }, type: { es: "Abierta" }, color: "emerald" },
            { id: 2, name: { es: "Defensa Siciliana" }, type: { es: "Semi-abierta" }, color: "blue" },
            { id: 3, name: { es: "Gambito de Dama" }, type: { es: "Cerrada" }, color: "purple" },
            { id: 4, name: { es: "Defensa Francesa" }, type: { es: "Semi-abierta" }, color: "rose" },
            { id: 5, name: { es: "Apertura Italiana" }, type: { es: "Abierta" }, color: "emerald" },
            { id: 6, name: { es: "Defensa Caro-Kann" }, type: { es: "Semi-abierta" }, color: "blue" },
            { id: 7, name: { es: "Defensa India de Rey" }, type: { es: "Semi-cerrada" }, color: "amber" },
            { id: 8, name: { es: "Defensa Nimzo-India" }, type: "Semi-cerrada", color: "amber" },
            { id: 9, name: { es: "Defensa Eslava" }, type: "Cerrada", color: "purple" },
            { id: 10, name: { es: "Apertura Inglesa" }, type: "Flanco", color: "cyan" },
            { id: 11, name: { es: "Defensa Pirc" }, type: "Semi-abierta", color: "blue" },
            { id: 12, name: { es: "Apertura Escocesa" }, type: "Abierta", color: "emerald" },
            { id: 13, name: { es: "Defensa Alekhine" }, type: "Semi-abierta", color: "blue" },
            { id: 14, name: "Gambito de Rey", type: "Abierta", color: "emerald" },
            { id: 15, name: "Defensa Holandesa", type: "Semi-cerrada", color: "amber" },
            { id: 16, name: "Sistema Londres", type: "Cerrada", color: "purple" },
            { id: 17, name: "Defensa Escandinava", type: "Semi-abierta", color: "blue" },
            { id: 18, name: "Apertura Reti", type: "Flanco", color: "cyan" },
            { id: 19, name: "Defensa Grünfeld", type: "Semi-cerrada", color: "amber" },
            { id: 20, name: "Defensa Benoni", type: "Semi-cerrada", color: "amber" }
        ];

        let boardState = [];
        let userRole = 'w';
        let currentStep = 0;
        let isWhiteTurn = true;
        let currentSteps = [];
        let dragFrom = null;

        function getT(obj) { if (!obj) return ""; if (typeof obj === 'string') return obj; return obj[currentLang] || obj['es'] || ""; }

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('ui-main-title').textContent = getT(UI_TEXT.mainTitle);
            document.getElementById('ui-main-subtitle').textContent = getT(UI_TEXT.mainSubtitle);
            document.getElementById('ui-btn-back').textContent = getT(UI_TEXT.backBtn);
            document.getElementById('btn-white').textContent = getT(UI_TEXT.playWhite);
            document.getElementById('btn-black').textContent = getT(UI_TEXT.playBlack);
            document.getElementById('ui-wrong-move').textContent = getT(UI_TEXT.wrongMove);
            document.getElementById('ui-level').textContent = getT(UI_TEXT.level);
            document.getElementById('ui-objective').textContent = getT(UI_TEXT.objective);
            document.getElementById('ui-theory').textContent = getT(UI_TEXT.theory);
            renderCards();
            updateUI();
        }

        function initGame() {
            boardState = INITIAL_BOARD.map(row => [...row]);
            currentStep = 0;
            isWhiteTurn = true;
            dragFrom = null;
            document.getElementById('feedback-console').innerHTML = '';
            updateUI();
            renderBoard();
            if (userRole === 'b' && isWhiteTurn) setTimeout(autoPlayOpponent, 800);
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            const rows = userRole === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
            const cols = userRole === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];

            for (let r of rows) {
                for (let c of cols) {
                    const isLight = (r + c) % 2 === 0;
                    const square = document.createElement('div');
                    square.className = `square ${isLight ? 'light' : 'dark'}`;
                    square.dataset.row = r;
                    square.dataset.col = c;
                    
                    if (userRole === 'w') {
                        if (c === 0) square.innerHTML += `<div class="coord-row">${8-r}</div>`;
                        if (r === 7) square.innerHTML += `<div class="coord-col">${String.fromCharCode(97+c)}</div>`;
                    } else {
                        if (c === 7) square.innerHTML += `<div class="coord-row">${8-r}</div>`;
                        if (r === 0) square.innerHTML += `<div class="coord-col">${String.fromCharCode(97+c)}</div>`;
                    }

                    const pieceCode = boardState[r][c];
                    if (pieceCode) {
                        const piece = document.createElement('div');
                        piece.className = 'piece';
                        piece.style.backgroundImage = `url(${PIECES_URL[pieceCode]})`;
                        piece.draggable = true;
                        
                        piece.addEventListener('dragstart', (e) => {
                            dragFrom = {r, c};
                            const isWhite = pieceCode === pieceCode.toUpperCase();
                            const isUserTurn = (userRole === 'w' && isWhiteTurn && isWhite) || (userRole === 'b' && !isWhiteTurn && !isWhite);
                            if(!isUserTurn) e.preventDefault();
                        });
                        square.appendChild(piece);
                    }

                    square.addEventListener('dragover', (e) => e.preventDefault());
                    square.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if(dragFrom) {
                            handleMoveAttempt(dragFrom.r, dragFrom.c, r, c);
                            dragFrom = null;
                        }
                    });
                    boardEl.appendChild(square);
                }
            }
        }

        function handleMoveAttempt(fr, fc, tr, tc) {
            if (currentStep >= currentSteps.length) return;
            const step = currentSteps[currentStep];
            const expected = (userRole === 'w') ? step.w : step.b;

            if (fr === expected.from[0] && fc === expected.from[1] && tr === expected.to[0] && tc === expected.to[1]) {
                logConsole(`${expected.san}`, "success");
                executeMove(fr, fc, tr, tc, expected);
                if (userRole === 'w') {
                    isWhiteTurn = false;
                    updateUI();
                    setTimeout(autoPlayOpponent, 700);
                } else {
                    isWhiteTurn = true;
                    currentStep++;
                    updateUI();
                    if(currentStep < currentSteps.length) setTimeout(autoPlayOpponent, 700);
                    else logConsole(getT(UI_TEXT.congratulations), "success");
                }
            } else {
                const err = userRole === 'w' ? step.errW : step.errB;
                const short = userRole === 'w' ? step.shortErrW : step.shortErrB;
                logConsole(getT(err), "error");
                highlightError(tr, tc);
                showErrorBanner(getT(short));
            }
        }

        function executeMove(fr, fc, tr, tc, moveData) {
            boardState[tr][tc] = boardState[fr][fc];
            boardState[fr][fc] = '';
            if (moveData.castle) {
                boardState[moveData.rTo[0]][moveData.rTo[1]] = boardState[moveData.rFrom[0]][moveData.rFrom[1]];
                boardState[moveData.rFrom[0]][moveData.rFrom[1]] = '';
            }
            renderBoard();
        }

        function autoPlayOpponent() {
            if (currentStep >= currentSteps.length) return;
            const step = currentSteps[currentStep];
            const oppMove = userRole === 'w' ? step.b : step.w;
            logConsole(`>> ${oppMove.san}`);
            executeMove(oppMove.from[0], oppMove.from[1], oppMove.to[0], oppMove.to[1], oppMove);
            if (userRole === 'w') { isWhiteTurn = true; currentStep++; } else { isWhiteTurn = false; }
            updateUI();
        }

        function updateUI() {
            const levelIndEl = document.getElementById('level-indicator');
            const progressEl = document.getElementById('progress-bar');
            const instTextEl = document.getElementById('instruction-text');
            const theoryTextEl = document.getElementById('theory-text');
            const turnIndEl = document.getElementById('turn-indicator');
            if(!levelIndEl) return;

            if(currentStep >= currentSteps.length) {
                progressEl.style.width = '100%';
                turnIndEl.textContent = getT(UI_TEXT.tutEnded);
                return;
            }

            levelIndEl.textContent = currentStep + 1;
            progressEl.style.width = `${((currentStep + 1) / 10) * 100}%`;
            const isMyTurn = (userRole === 'w' && isWhiteTurn) || (userRole === 'b' && !isWhiteTurn);
            
            if (isMyTurn) {
                turnIndEl.textContent = getT(UI_TEXT.turnUser);
                turnIndEl.className = "text-sm font-mono bg-blue-900 px-3 py-1 rounded text-blue-300 animate-pulse";
                instTextEl.textContent = userRole === 'w' ? getT(currentSteps[currentStep].instW) : getT(currentSteps[currentStep].instB);
                theoryTextEl.textContent = userRole === 'w' ? getT(currentSteps[currentStep].teoriaW) : getT(currentSteps[currentStep].teoriaB);
            } else {
                turnIndEl.textContent = getT(UI_TEXT.turnOpp);
                turnIndEl.className = "text-sm font-mono bg-slate-700 px-3 py-1 rounded text-slate-300";
                instTextEl.textContent = "...";
                theoryTextEl.textContent = "...";
            }
        }

        function logConsole(msg, type="info") {
            const consoleEl = document.getElementById('feedback-console');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-rose-400 font-bold fade-in' : type === 'success' ? 'text-emerald-400 fade-in' : 'text-slate-400 fade-in';
            div.textContent = `>> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function highlightError(r, c) {
            const sq = document.querySelector(`.square[data-row="${r}"][data-col="${c}"]`);
            if(sq) {
                sq.classList.add('error-highlight');
                setTimeout(() => sq.classList.remove('error-highlight'), 500);
            }
        }

        let errorBannerTimeout;
        function showErrorBanner(msg) {
            const banner = document.getElementById('error-banner');
            const title = document.getElementById('title-container');
            document.getElementById('error-banner-text').textContent = msg;
            title.classList.add('opacity-0');
            banner.classList.remove('opacity-0', 'pointer-events-none');
            clearTimeout(errorBannerTimeout);
            errorBannerTimeout = setTimeout(() => {
                title.classList.remove('opacity-0');
                banner.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function renderCards() {
            const grid = document.getElementById('openings-grid');
            grid.innerHTML = '';
            chessOpenings.forEach(op => {
                const card = document.createElement('button');
                card.className = "opening-card group bg-slate-800/80 border border-slate-700 rounded-xl p-5 flex flex-col min-h-[120px]";
                card.onclick = () => {
                    const mod = OPENING_MODULES[op.id];
                    if (mod) {
                        currentSteps = mod.steps;
                        document.getElementById('title-container').innerHTML = `<h1 class="text-2xl font-bold ${mod.colorTheme}">${getT(op.name)}</h1><p class="text-slate-400">${getT(mod.subtitle)}</p>`;
                        document.getElementById('menu-view').classList.add('hidden');
                        document.getElementById('game-view').classList.remove('hidden');
                        document.getElementById('game-view').classList.add('flex');
                        initGame();
                    } else {
                        showUnderConstruction(getT(op.name));
                    }
                };
                card.innerHTML = `<span class="text-xs font-bold text-emerald-400 mb-2">${getT(op.type)}</span><h2 class="text-xl font-bold">${getT(op.name)}</h2>`;
                grid.appendChild(card);
            });
        }

        function backToMenu() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
        }

        function switchRole(role) {
            userRole = role;
            document.getElementById('btn-white').className = role === 'w' ? 'px-4 py-2 rounded-md bg-emerald-600 text-white font-semibold' : 'px-4 py-2 rounded-md text-slate-300';
            document.getElementById('btn-black').className = role === 'b' ? 'px-4 py-2 rounded-md bg-emerald-600 text-white font-semibold' : 'px-4 py-2 rounded-md text-slate-300';
            initGame();
        }

        window.onload = () => changeLanguage('es');
    </script>
</body>
