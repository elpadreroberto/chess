 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Aperturas de Ajedrez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        }

        /* --- Estilos del Menú --- */
        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { transform: translate(-50%, 0); opacity: 1; }
            to { transform: translate(-50%, 20px); opacity: 0; }
        }

        .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: fadeOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .opening-card { transition: all 0.2s ease-in-out; }
        .opening-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.15), 0 8px 10px -6px rgba(16, 185, 129, 0.1);
        }

        /* --- Estilos del Tablero y Juego --- */
        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border: 4px solid #334155;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .square.light { background-color: #e2e8f0; }
        .square.dark { background-color: #64748b; }
        .square.highlight { background-color: rgba(234, 179, 8, 0.5); }
        .square.error-highlight { background-color: rgba(239, 68, 68, 0.6); }

        .piece {
            width: 80%;
            height: 80%;
            cursor: grab;
            background-size: cover;
            background-position: center;
            user-select: none;
            filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.4));
            transition: transform 0.1s;
        }
        .piece:active { cursor: grabbing; transform: scale(1.1); }

        .coord-col {
            position: absolute; bottom: 2px; right: 4px; font-size: 10px; font-weight: bold; color: #1e293b;
        }
        .coord-row {
            position: absolute; top: 2px; left: 4px; font-size: 10px; font-weight: bold; color: #1e293b;
        }
        .square.dark .coord-col, .square.dark .coord-row { color: #f1f5f9; }

        .terminal {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            background-color: #020617;
            border: 1px solid #334155;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center relative pb-24">

    <!-- Botón de Idioma (Top Right) -->
    <button id="lang-btn" onclick="toggleLanguageBtn()" class="absolute top-4 right-4 md:top-6 md:right-8 bg-slate-800 text-slate-300 border border-slate-700 hover:border-slate-500 px-4 py-2 rounded-lg font-bold text-sm transition-all duration-300 z-50">
        ES
    </button>

    <!-- ==================== VISTA DEL MENÚ ==================== -->
    <div id="menu-view" class="w-full flex flex-col items-center w-full max-w-7xl">

            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500 mb-4 drop-shadow-sm">
                Aperturas de ajedrez
            </h1>
            <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto">
                Selecciona un sistema
            </p>
        </header>

        <main class="w-full">
            <div id="openings-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                <!-- Las tarjetas se inyectarán aquí mediante JavaScript -->
            </div>
        </main>
    </div>

    <!-- Notificación Toast (En Construcción) -->
    <div id="toast-notification" class="fixed bottom-8 left-1/2 -translate-x-1/2 hidden z-50">

            <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <span id="toast-message" class="font-medium text-sm md:text-base">Módulo en construcción...</span>
        </div>
    </div>


    <!-- ==================== VISTA DEL JUEGO ==================== -->
    <div id="game-view" class="hidden w-full max-w-6xl flex-col items-center">
        
        <header class="w-full mb-8 flex flex-col md:flex-row justify-between items-center gap-4 mt-4">
            
            <div class="relative flex-grow min-h-[4rem] w-full flex items-center gap-4">

                <button onclick="backToMenu()" class="shrink-0 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 p-2 md:px-4 md:py-2 rounded-md font-semibold transition-colors flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    <span class="hidden md:inline">Volver</span>
                </button>

                <!-- Título Principal del Juego (Inyectado dinámicamente) -->
                <div id="title-container" class="transition-opacity duration-300 w-full">
                    <!-- Contenido inyectado por JS -->
                </div>
                
                <!-- Banner de Error Oculto -->
                <div id="error-banner" class="opacity-0 pointer-events-none absolute left-[3.5rem] md:left-[7.5rem] top-0 w-[calc(100%-3.5rem)] md:w-4/5 h-full bg-rose-600 rounded-lg flex items-center px-4 shadow-lg shadow-rose-900/50 transition-opacity duration-300 z-10">
                    <div class="flex items-center gap-3">
                        <svg class="w-8 h-8 text-white shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <div>
                            <h2 class="text-xl font-bold text-white leading-tight">¡Movimiento Incorrecto!</h2>
                            <p id="error-banner-text" class="text-rose-100 text-sm leading-tight">Razón del error...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2 bg-slate-800 p-1 rounded-lg border border-slate-700 shrink-0 z-20">
                <button id="btn-white" onclick="switchRole('w')" class="px-4 py-2 rounded-md bg-emerald-600 text-white font-semibold transition-colors">Jugar Blancas</button>
                <button id="btn-black" onclick="switchRole('b')" class="px-4 py-2 rounded-md text-slate-300 hover:bg-slate-700 font-semibold transition-colors">Jugar Negras</button>
            </div>
        </header>

        <main class="w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Tablero Section -->
            <div class="flex justify-center items-start">
                <div id="board" class="chessboard">
                    <!-- Se inyecta via JS -->
                </div>
            </div>

            <!-- Panel de Control y Teoría -->
            <div class="flex flex-col gap-4 w-full">
                <!-- Progreso -->
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg">
                    <div class="flex justify-between items-end mb-2">
                        <h2 class="text-xl font-bold text-white">Nivel <span id="level-indicator">1</span> / 10</h2>
                        <span id="turn-indicator" class="text-sm font-mono bg-slate-900 px-3 py-1 rounded text-emerald-400">Turno: Tu turno</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-2.5">
                        <div id="progress-bar" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500" style="width: 10%"></div>
                    </div>
                </div>

                <!-- Instrucción Actual -->
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg flex-grow">
                    <h3 class="text-lg font-semibold text-blue-400 mb-2 border-b border-slate-700 pb-2">Objetivo del Nivel</h3>
                    <p id="instruction-text" class="text-slate-200 text-lg leading-relaxed"></p>
                    
                    <div class="mt-4 bg-slate-900/50 p-4 rounded-lg border border-slate-700">

                        <p id="theory-text" class="text-sm text-slate-300 italic"></p>
                    </div>
                </div>

                <!-- Consola de Comentarios / Feedback -->
                <div class="terminal rounded-xl p-4 shadow-lg h-48 overflow-y-auto flex flex-col gap-2" id="feedback-console">
                    <div class="text-slate-500">>> Sistema inicializado. Tablero montado.</div>
                    <div class="text-emerald-400">>> Esperando entrada del usuario...</div>
                </div>
            </div>
        </main>
    </div>

                    { w: { from: [6,5], to: [4,5], san: "f4" }, b: { from: [0,5], to: [1,4], san: "Be7" }, instW: "Gana espacio en el flanco de rey. Empuja el peón a f4.", instB: "Rompe la clavada potencial. Desarrolla el Alfil a e7.", teoriaW: "Preparas f5 o e5 para abrir líneas contra el rey negro. Es un ataque directo y sin concesiones.", teoriaB: "Una jugada serena. Desactivas la presión del alfil de g5 y te preparas para llevar tu rey a un lugar seguro.", errW: "Error: Empuja el peón a f4 para preparar la ruptura.", errB: "Error: Desarrolla el Alfil a e7 para desclavar tu caballo.", shortErrW: "Pierdes la iniciativa en el ataque en el flanco de rey.", shortErrB: "Tu caballo sigue clavado peligrosamente." },
                    { w: { from: [7,3], to: [5,5], san: "Qf3" }, b: { from: [0,3], to: [1,2], san: "Qc7" }, instW: "Centraliza la dama. Juega la Dama a f3.", instB: "Optimiza la dama. Mueve la Dama a c7.", teoriaW: "La Dama en f3 mira hacia el flanco de dama, defiende e4 si es necesario, y sobre todo, libera la casilla d1 para enrocar largo.", teoriaB: "Casilla ideal para la dama en la Siciliana. Controla la columna semiabierta 'c' y vigila la casilla e5.", errW: "Error: Mueve la Dama a f3 para preparar el enroque largo.", errB: "Error: Juega la Dama a c7, su casilla natural en este esquema.", shortErrW: "No preparas el enroque largo correctamente.", shortErrB: "Desperdicias el potencial ofensivo de la columna C." },
                    { w: { from: [7,4], to: [7,2], san: "O-O-O", castle: true, rFrom: [7,0], rTo: [7,3] }, b: { from: [0,1], to: [1,3], san: "Nbd7" }, instW: "¡Enroque largo! (O-O-O). Mueve el Rey a c1.", instB: "Continúa el desarrollo con flexibilidad. Caballo de b a d7.", teoriaW: "Aseguras tu rey, pero lo más importante: traes la torre de a1 directamente al centro (columna d) con un solo movimiento.", teoriaB: "Este caballo apoya a su compañero de f6, controla c5 y e5, y mantiene la estructura flexible.", errW: "Error: Enróca largo moviendo el rey a c1.", errB: "Error: Desarrolla tu último caballo a d7 (Nbd7).", shortErrW: "El rey sigue vulnerable en el centro.", shortErrB: "Retrasas el desarrollo de tu última pieza menor." },
                    { w: { from: [6,6], to: [4,6], san: "g4" }, b: { from: [1,1], to: [3,1], san: "b5" }, instW: "Inicia la tormenta de peones. Juega g4.", instB: "Contraataque en el flanco opuesto. Juega b5.", teoriaW: "La declaración de guerra. Las blancas lanzan sus peones (g4, g5) para destruir la barrera defensiva del enroque negro.", teoriaB: "Enroques opuestos significa carrera de ataques. Lanzas tu propio ataque por el flanco de dama buscando generar caos antes que las blancas. ¡El fin de la apertura y el inicio del caos táctico!", errW: "Error: Juega g4. Es el momento de iniciar la avalancha.", errB: "Error: Juega b5 para lanzar el contraataque.", shortErrW: "Retrasas tu ataque principal en el flanco de rey.", shortErrB: "Eres demasiado lento. ¡Debes contraatacar en el flanco de dama!" }
                ]
            },
            3: {
                title: "Gambito de Dama",
                subtitle: "Tutorial interactivo (Variante Ortodoxa Declinada).",
                colorTheme: "text-purple-400",
                steps: [
                    { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "Ocupa el centro. Mueve tu peón de dama a d4.", instB: "Desafía el centro. Mueve tu peón a d5.", teoriaW: "d4 controla e5 y c5, preparando el desarrollo de tus piezas del flanco de dama.", teoriaB: "Al igual que con e5, d5 impide que las blancas dominen el centro libremente.", errW: "Error: El Gambito de Dama comienza con d4.", errB: "Error: Juega d5 para establecer una presencia central fuerte.", shortErrW: "Pierdes la iniciativa central de d4.", shortErrB: "No desafías el centro blanco." },
                    { w: { from: [6,2], to: [4,2], san: "c4" }, b: { from: [1,4], to: [2,4], san: "e6" }, instW: "¡El Gambito! Ofrece el peón de c4.", instB: "Declina el gambito. Fortalece el centro con e6.", teoriaW: "Ofreces un peón lateral para desviar el peón central negro de d5. Si capturan, dominas el centro con e4.", teoriaB: "El Gambito de Dama Declinado. Sostienes tu peón de d5 con otro peón para no ceder el centro.", errW: "Error: Debes jugar c4 para plantear el gambito.", errB: "Error: Juega e6 para defender d5 de forma sólida.", shortErrW: "Ese no es el Gambito de Dama (juega c4).", shortErrB: "No mantienes la tensión; defiende con e6." },
                    { w: { from: [7,1], to: [5,2], san: "Nc3" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "Desarrolla y presiona. Caballo a c3.", instB: "Defiende d5 y desarrolla. Caballo a f6.", teoriaW: "Aumentas la presión sobre d5 y controlas la casilla clave e4.", teoriaB: "El caballo es el defensor perfecto para el centro y prepara el enroque.", errW: "Error: Desarrolla tu caballo a c3 para presionar d5.", errB: "Error: Juega tu caballo a f6.", shortErrW: "Falta de desarrollo y presión sobre d5.", shortErrB: "Tu centro requiere la defensa del caballo." },
                    { w: { from: [7,2], to: [3,6], san: "Bg5" }, b: { from: [0,5], to: [1,4], san: "Be7" }, instW: "Clava el defensor. Alfil a g5.", instB: "Rompe la clavada. Alfil a e7.", teoriaW: "Al clavar el caballo de f6 (que defiende d5), incrementas indirectamente la presión sobre el centro.", teoriaB: "Desarrollas el alfil, preparas el enroque y eliminas la molesta clavada sobre tu caballo.", errW: "Error: Clava el caballo con tu alfil en g5.", errB: "Error: Desarrolla tu alfil a e7 para desclavar el caballo.", shortErrW: "No aprovechas para inmovilizar al defensor.", shortErrB: "Sigues sufriendo la clavada del alfil blanco." },
                    { w: { from: [6,4], to: [5,4], san: "e3" }, b: { from: [0,4], to: [0,6], san: "O-O", castle: true, rFrom: [0,7], rTo: [0,5] }, instW: "Solidifica tu estructura. Juega e3.", instB: "Asegura el rey. Enroque corto.", teoriaW: "Proteges el peón de d4 y abres la diagonal para desarrollar tu Alfil de casillas claras.", teoriaB: "Con el centro bajo tensión, la seguridad del rey es la máxima prioridad antes de realizar rupturas.", errW: "Error: Juega e3 para solidificar y abrir la diagonal de tu alfil.", errB: "Error: Es momento de enrocar (O-O).", shortErrW: "Tu estructura central necesita apoyo (e3).", shortErrB: "¡Rey en peligro! Aún no has enrocado." },
                    { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,1], to: [1,3], san: "Nbd7" }, instW: "Continúa el desarrollo. Caballo a f3.", instB: "Desarrolla tu último caballo a d7.", teoriaW: "Desarrollas tu última pieza menor del flanco de rey preparándote para el enroque.", teoriaB: "El caballo en d7 apoya a f6 y c5, manteniendo la flexibilidad sin bloquear tu peón c.", errW: "Error: Desarrolla el caballo a f3.", errB: "Error: Desarrolla el caballo del flanco de dama a d7.", shortErrW: "Retrasas el desarrollo de tu flanco de rey.", shortErrB: "Desarrolla tu caballo a d7." },
                    { w: { from: [7,0], to: [7,2], san: "Rc1" }, b: { from: [1,2], to: [2,2], san: "c6" }, instW: "Activa la torre. Torre a c1.", instB: "Fortifica el centro. Juega c6.", teoriaW: "La columna C suele abrirse en el Gambito de Dama. Colocar la torre ahí es profilaxis y ataque a la vez.", teoriaB: "Creas una estructura de 'cuña' muy sólida (c6-d5-e6) que es el sello de la Defensa Ortodoxa.", errW: "Error: Mueve la torre de a1 a c1.", errB: "Error: Juega el peón a c6 para sostener d5.", shortErrW: "No preparas tu torre para la columna semiabierta.", shortErrB: "Tu centro necesita la roca sólida de c6." },
                    { w: { from: [7,5], to: [5,3], san: "Bd3" }, b: { from: [3,3], to: [4,2], san: "dxc4" }, instW: "Desarrolla el Alfil a d3.", instB: "Acepta el cambio ahora. Captura en c4 (dxc4).", teoriaW: "Un alfil muy activo que apunta hacia el flanco de rey negro. Completas el desarrollo menor.", teoriaB: "Ahora que el alfil blanco se movió, capturas en c4 para obligarlo a moverse dos veces, ganando un tiempo.", errW: "Error: Desarrolla tu alfil de casillas claras a d3.", errB: "Error: Captura el peón de c4 con tu peón de d5.", shortErrW: "El alfil debe ir a su diagonal más activa (d3).", shortErrB: "Es el momento de ganar un tiempo capturando en c4." },
                    { w: { from: [5,3], to: [4,2], san: "Bxc4" }, b: { from: [2,5], to: [3,3], san: "Nd5" }, instW: "Recaptura el peón. Alfil toma en c4.", instB: "Centraliza el caballo. Caballo a d5.", teoriaW: "Recuperas tu material y tu alfil queda excelentemente ubicado apuntando a f7.", teoriaB: "Aprovechas que d5 está libre para centralizar tu caballo y proponer cambios de piezas menores para liberar tu posición.", errW: "Error: Recaptura el peón de c4 con tu alfil.", errB: "Error: Juega el caballo de f6 a d5.", shortErrW: "Debes recuperar tu peón con el Alfil.", shortErrB: "Pierdes la chance de centralizar y liberar espacio." },
                    { w: { from: [3,6], to: [1,4], san: "Bxe7" }, b: { from: [0,3], to: [1,4], san: "Qxe7" }, instW: "Intercambia alfiles. Alfil toma en e7.", instB: "Recaptura con la Dama en e7.", teoriaW: "Aceptas el cambio propuesto por las negras para simplificar y luego enrocar pacíficamente.", teoriaB: "Recapturas con la Dama, conectando tus torres. Has sobrevivido a la apertura con una posición muy sólida y sin debilidades.", errW: "Error: Captura el alfil negro de e7.", errB: "Error: Recaptura el alfil con tu Dama (Qxe7).", shortErrW: "Debes simplificar la tensión cambiando alfiles.", shortErrB: "Solo recaptura el alfil con la Dama." }
                ]
            },
            4: {
                title: "Defensa Francesa",
                subtitle: "Tutorial interactivo (Variante del Avance).",
                colorTheme: "text-rose-400",
                steps: [
                    { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,4], to: [2,4], san: "e6" }, instW: "Domina el centro. Mueve e4.", instB: "Defensa Francesa. Juega e6.", teoriaW: "Reclamas el centro clásico abriendo líneas para tus piezas.", teoriaB: "Preparas d5. A diferencia de e5, e6 crea una estructura asimétrica muy sólida, aunque bloquea temporalmente a tu Alfil de c8.", errW: "Error: La Defensa Francesa se juega contra e4.", errB: "Error: Juega e6 para iniciar la Francesa.", shortErrW: "Pierdes el control central inicial.", shortErrB: "Esa no es la Defensa Francesa (juega e6)." },
                    { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "Toma el control total. Mueve d4.", instB: "Golpea el centro. Juega d5.", teoriaW: "Aprovechas que las negras no jugaron e5 para establecer un centro de peones ideal.", teoriaB: "Atacas directamente e4 y cuestionas el dominio central de las blancas de inmediato.", errW: "Error: Juega d4 para ocupar el centro completo.", errB: "Error: Juega d5 atacando el centro.", shortErrW: "Debes ocupar el centro con d4.", shortErrB: "Debes desafiar el centro con d5." },
                    { w: { from: [4,4], to: [3,4], san: "e5" }, b: { from: [1,2], to: [3,2], san: "c5" }, instW: "Cierra el centro. Avanza a e5.", instB: "Contraataca la base. Juega c5.", teoriaW: "La Variante del Avance. Ganas espacio en el flanco de rey y bloqueas la posición.", teoriaB: "La regla de oro contra centros cerrados: atacar la base de la cadena de peones (d4).", errW: "Error: Avanza tu peón a e5.", errB: "Error: Juega c5 para atacar d4.", shortErrW: "No entras en la Variante del Avance (e5).", shortErrB: "¡Ataca la cadena de peones con c5!" },
                    { w: { from: [6,2], to: [5,2], san: "c3" }, b: { from: [0,1], to: [2,2], san: "Nc6" }, instW: "Defiende tu cadena. Juega c3.", instB: "Aumenta la presión. Caballo a c6.", teoriaW: "Sostienes a tu peón clave en d4. Si las negras capturan cxd4, retomarás con cxd4 manteniendo el centro intacto.", teoriaB: "Desarrollas una pieza y añades un segundo atacante sobre el punto crítico d4.", errW: "Error: Juega c3 para mantener la estructura de peones.", errB: "Error: Desarrolla el caballo a c6 para atacar d4.", shortErrW: "Tu centro (d4) colapsará si no juegas c3.", shortErrB: "Falta de presión; desarrolla el Caballo a c6." },
                    { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,3], to: [2,1], san: "Qb6" }, instW: "Refuerza la defensa. Caballo a f3.", instB: "Máxima presión sobre d4. Dama a b6.", teoriaW: "Desarrollas tu caballo y proteges d4 una vez más.", teoriaB: "La dama en b6 es típica en la Francesa. Ataca d4 por tercera vez y además mira de reojo a b2.", errW: "Error: Desarrolla el caballo a f3 defendiendo d4.", errB: "Error: Mueve la Dama a b6.", shortErrW: "Debes seguir defendiendo d4 con Nf3.", shortErrB: "No aprovechas la Dama para presionar d4 y b2." },
                    { w: { from: [6,0], to: [5,0], san: "a3" }, b: { from: [0,6], to: [2,7], san: "Nh6" }, instW: "Profilaxis. Juega a3.", instB: "Busca una ruta alternativa. Caballo a h6.", teoriaW: "Preparas la expansión b4 para ganar espacio en el flanco de dama y expulsar a las piezas negras.", teoriaB: "Como Nf6 está bloqueado por el peón de e5, el caballo va a h6 preparándose para saltar a f5 y sumar presión en d4.", errW: "Error: Juega a3 preparando b4.", errB: "Error: Desarrolla el caballo por h6 (hacia f5).", shortErrW: "No preparas la expansión en el flanco de dama.", shortErrB: "El caballo debe ir a h6 (rumbo a f5)." },
                    { w: { from: [6,1], to: [4,1], san: "b4" }, b: { from: [3,2], to: [4,3], san: "cxd4" }, instW: "Gana espacio. Empuja b4.", instB: "Rompe la tensión. Captura en d4 (cxd4).", teoriaW: "Ganas espacio masivo en el flanco de dama y fuerzas a las negras a tomar una decisión con su peón de c5.", teoriaB: "Antes de que te asfixien, liberas la tensión central capturando en d4.", errW: "Error: Juega b4 para presionar el flanco de dama.", errB: "Error: Captura el peón de d4 con el de c5.", shortErrW: "Pierdes la oportunidad de expandirte con b4.", shortErrB: "Debes cambiar los peones centrales ahora." },
                    { w: { from: [5,2], to: [4,3], san: "cxd4" }, b: { from: [2,7], to: [3,5], san: "Nf5" }, instW: "Mantiene la cadena. Peón c toma d4.", instB: "Ataque cuádruple. Caballo a f5.", teoriaW: "Recapturas y tu centro de peones sigue dominando el tablero.", teoriaB: "El caballo llega a su destino ideal. Ahora tienes 4 piezas atacando d4. ¡La presión es asfixiante!", errW: "Error: Recaptura en d4 con el peón c.", errB: "Error: Salta con el caballo de h6 a f5.", shortErrW: "Rompes tu propia cadena si no tomas con el peón c.", shortErrB: "No completas la maniobra del caballo a f5." },
                    { w: { from: [7,2], to: [6,1], san: "Bb2" }, b: { from: [0,5], to: [1,4], san: "Be7" }, instW: "Defensa final de d4. Alfil a b2.", instB: "Prepara el enroque. Alfil a e7.", teoriaW: "Desarrollas el alfil en fianchetto para sostener el peón de d4, el cual está bajo un ataque brutal.", teoriaB: "Tu ataque central está listo. Ahora desarrollas tranquilamente tu alfil para poner tu rey a salvo.", errW: "Error: Desarrolla el alfil a b2 para defender d4.", errB: "Error: Desarrolla el alfil a e7.", shortErrW: "El peón de d4 caerá si no lo defiendes con Bb2.", shortErrB: "Retrasas el desarrollo y el enroque." },
                    { w: { from: [7,5], to: [5,3], san: "Bd3" }, b: { from: [0,2], to: [1,3], san: "Bd7" }, instW: "Completa el desarrollo. Alfil a d3.", instB: "Desarrolla el 'Alfil Malo'. Alfil a d7.", teoriaW: "Desarrollas tu última pieza menor, atacas al caballo de f5 y preparas el enroque. Fin de la apertura.", teoriaB: "El alfil de c8 es el mayor problema de la Francesa al estar bloqueado. Lo desarrollas a d7 preparando poner tus torres en la columna C. ¡Posición súper estratégica!", errW: "Error: Desarrolla el Alfil a d3.", errB: "Error: Mueve el Alfil de casillas claras a d7.", shortErrW: "Tu alfil debe ir a d3 apuntando al flanco de rey.", shortErrB: "Debes buscarle juego a tu 'alfil malo' en d7." }
                ]
            },
            5: {
                title: "Apertura Italiana",
                subtitle: "Tutorial interactivo (Giuoco Piano).",
                colorTheme: "text-emerald-400",
                steps: [

                    { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,1], to: [2,2], san: "Nc6" }, instW: "Desarrolla con amenaza. Caballo a f3.", instB: "Defiende e5. Caballo a c6.", teoriaW: "Atacas e5 y desarrollas una pieza clave.", teoriaB: "Defiendes tu peón central mientras desarrollas tu caballo del flanco de dama.", errW: "Error: Desarrolla tu caballo a f3 atacando e5.", errB: "Error: Defiende e5 desarrollando el Caballo a c6.", shortErrW: "Falta de desarrollo; no generas presión central.", shortErrB: "Arriesgas tu peón central (e5)." },
                    { w: { from: [7,5], to: [4,2], san: "Bc4" }, b: { from: [0,5], to: [3,2], san: "Bc5" }, instW: "¡La Italiana! Alfil a c4.", instB: "Giuoco Piano. Alfil a c5.", teoriaW: "El Alfil apunta al punto más débil de las negras: la casilla f7, que solo defiende el Rey.", teoriaB: "Respondes de la misma manera, apuntando a f2 y controlando el centro antes de enrocar.", errW: "Error: La Apertura Italiana requiere mover el alfil a c4.", errB: "Error: Entra en el Giuoco Piano jugando Bc5.", shortErrW: "Esa no es la Apertura Italiana (juega Bc4).", shortErrB: "Debes desarrollar tu Alfil a c5 (Giuoco Piano)." },
                    { w: { from: [6,2], to: [5,2], san: "c3" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "Prepara el centro fuerte. Juega c3.", instB: "Desarrolla atacando. Caballo a f6.", teoriaW: "Sostienes un futuro d4 para crear el par de peones centrales perfecto (c3 y d4).", teoriaB: "Atacas el peón indefenso de e4 y desarrollas tu última pieza del flanco de rey.", errW: "Error: Juega c3 para preparar la ruptura d4.", errB: "Error: Desarrolla tu caballo a f6 atacando e4.", shortErrW: "No preparas la formación de tu centro ideal.", shortErrB: "Debes presionar el peón blanco de e4." },
                    { w: { from: [6,3], to: [5,3], san: "d3" }, b: { from: [1,3], to: [2,3], san: "d6" }, instW: "El Giuoco Pianissimo. Juega d3.", instB: "Sólido como una roca. Juega d6.", teoriaW: "En lugar del agresivo d4, optas por un esquema más posicional, defendiendo e4 y liberando tu alfil de casillas oscuras.", teoriaB: "Defiendes sólidamente e5 y abres la diagonal para tu alfil de c8.", errW: "Error: Juega d3 para sostener e4 de forma sólida.", errB: "Error: Juega d6 para fortalecer tu estructura de peones.", shortErrW: "Dejas tu peón de e4 colgado.", shortErrB: "Tu centro carece de soporte estructural." },
                    { w: { from: [7,4], to: [7,6], san: "O-O", castle: true, rFrom: [7,7], rTo: [7,5] }, b: { from: [0,4], to: [0,6], san: "O-O", castle: true, rFrom: [0,7], rTo: [0,5] }, instW: "Seguridad primero. Enroque corto.", instB: "Rey seguro. Enroque corto.", teoriaW: "Con el centro estable, es momento de resguardar al rey antes de las maniobras.", teoriaB: "Completas la seguridad de tu rey para responder a cualquier ataque futuro.", errW: "Error: Es vital asegurar tu rey con el enroque corto (O-O).", errB: "Error: Enróca corto para resguardar a tu rey (O-O).", shortErrW: "¡Tu rey corre peligro en el centro!", shortErrB: "Debes poner tu rey a salvo." },
                    { w: { from: [7,5], to: [7,4], san: "Re1" }, b: { from: [1,0], to: [2,0], san: "a6" }, instW: "Torre al centro. Juega Re1.", instB: "Profilaxis y espacio. Juega a6.", teoriaW: "Sobreproteges e4 y liberas la casilla f1, por donde suele reubicarse el caballo de b1.", teoriaB: "Preparas un refugio (a7) para tu valioso Alfil de c5 por si las blancas lo atacan con b4 o Na4.", errW: "Error: Mueve la torre de f1 a e1.", errB: "Error: Juega a6 para dar refugio a tu alfil.", shortErrW: "La torre debe apoyar el centro desde e1.", shortErrB: "Tu alfil italiano podría quedar atrapado sin a6." },
                    { w: { from: [4,2], to: [5,1], san: "Bb3" }, b: { from: [3,2], to: [1,0], san: "Ba7" }, instW: "Resguarda tu alfil. Juega Bb3.", instB: "Refugia el alfil. Juega Ba7.", teoriaW: "Te anticipas al ataque negro (...Na5 o ...d5) guardando preventivamente tu mejor pieza.", teoriaB: "Igualmente, las negras guardan su alfil en una casilla segura pero manteniendo la diagonal activa.", errW: "Error: Retira tu alfil preventivamente a b3.", errB: "Error: Mueve tu alfil de c5 a a7.", shortErrW: "Dejas tu valioso Alfil italiano expuesto.", shortErrB: "El alfil necesita refugiarse en a7." },
                    { w: { from: [6,7], to: [5,7], san: "h3" }, b: { from: [1,7], to: [2,7], san: "h6" }, instW: "Evita clavadas molestas. Juega h3.", instB: "Copiar por seguridad. Juega h6.", teoriaW: "Una jugada casi universal en la Italiana para evitar Bg4, lo cual arruinaría tu estructura si debes mover la Dama.", teoriaB: "Las negras hacen lo mismo, quitándole la casilla g5 al caballo o alfil blanco.", errW: "Error: Juega h3 para evitar la clavada.", errB: "Error: Juega h6 para controlar g5.", shortErrW: "Permites la molesta clavada Bg4.", shortErrB: "Permites saltos peligrosos a g5." },
                    { w: { from: [7,1], to: [6,3], san: "Nbd2" }, b: { from: [0,5], to: [0,4], san: "Re8" }, instW: "Inicia la Maniobra Italiana. Caballo a d2.", instB: "Centraliza la torre. Torre a e8.", teoriaW: "El plan magistral: el caballo viajará de b1 a d2, luego a f1, y finalmente a g3 o e3 para asaltar el flanco de rey.", teoriaB: "Colocas la torre en la misma columna que el rey rival y preparas maniobras defensivas o rupturas con d5. ¡El medio juego comienza!", errW: "Error: Desarrolla el caballo de b1 a d2.", errB: "Error: Mueve la torre de f8 a e8.", shortErrW: "No inicias la tradicional 'Maniobra Italiana'.", shortErrB: "Debes activar tu torre centralmente (Re8)." }
                ]
            },
            6: {
                title: "Defensa Caro-Kann",
                subtitle: "Tutorial interactivo (Variante Clásica).",
                colorTheme: "text-blue-400",
                steps: [
                    { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,2], to: [2,2], san: "c6" }, instW: "Toma el centro. Mueve e4.", instB: "Defensa Caro-Kann. Juega c6.", teoriaW: "Juegas la apertura más popular y ambiciosa.", teoriaB: "Preparando d5 de una manera más sólida que la Francesa, ya que no bloqueas el desarrollo de tu Alfil de casillas claras (c8).", errW: "Error: La Caro-Kann se juega contra e4.", errB: "Error: Juega c6 para iniciar la Defensa Caro-Kann.", shortErrW: "Pierdes el control central inicial.", shortErrB: "Esa no es la Caro-Kann (juega c6)." },
                    { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "Centro ideal. Mueve d4.", instB: "Golpea el centro. Juega d5.", teoriaW: "Ganas espacio central incondicional con tu segundo peón.", teoriaB: "Cuestionas el centro blanco inmediatamente. Si toman tu peón, retomarás con c6 manteniendo una buena estructura.", errW: "Error: Consolida el centro con d4.", errB: "Error: Juega d5 para desafiar el peón de e4.", shortErrW: "Debes ocupar el centro con d4.", shortErrB: "Debes desafiar el centro con d5." },
                    { w: { from: [7,1], to: [5,2], san: "Nc3" }, b: { from: [3,3], to: [4,4], san: "dxe4" }, instW: "Defiende desarrollando. Caballo a c3.", instB: "Libera la tensión. Captura en e4 (dxe4).", teoriaW: "Proteges e4 y preparas la Variante Clásica. Es la respuesta más directa.", teoriaB: "Cambias tu peón lateral por un peón central y limpias la columna d para el futuro.", errW: "Error: Desarrolla el caballo a c3 para defender e4.", errB: "Error: Captura el peón de e4 con tu peón d.", shortErrW: "Dejas tu peón de e4 sin defensa de piezas.", shortErrB: "Es necesario resolver la tensión central (dxe4)." },
                    { w: { from: [5,2], to: [4,4], san: "Nxe4" }, b: { from: [0,2], to: [3,5], san: "Bf5" }, instW: "Recaptura centralizando. Caballo toma en e4.", instB: "Desarrolla atacando. Alfil a f5.", teoriaW: "Tienes un caballo fuertemente posicionado en el centro del tablero.", teoriaB: "El sello de la Caro-Kann Clásica. Desarrollas el alfil (que en la Francesa quedaría atrapado) atacando al caballo de e4.", errW: "Error: Recaptura el peón con tu caballo (Nxe4).", errB: "Error: Mueve tu Alfil a f5 atacando al caballo.", shortErrW: "Pierdes el centro al no recapturar.", shortErrB: "No aprovechas la diagonal libre para tu Alfil." },
                    { w: { from: [4,4], to: [5,6], san: "Ng3" }, b: { from: [3,5], to: [2,6], san: "Bg6" }, instW: "Retira el caballo con amenaza. Caballo a g3.", instB: "Mantiene la presión. Alfil a g6.", teoriaW: "Quitas tu caballo del ataque y a la vez atacas al alfil recién desarrollado.", teoriaB: "El alfil se retira, pero se mantiene en una diagonal muy activa, apuntando hacia el flanco de dama blanco.", errW: "Error: Mueve el caballo a g3.", errB: "Error: Retira el alfil a g6.", shortErrW: "Tu caballo en e4 está atacado; muévelo a g3.", shortErrB: "No quieres perder tu alfil sin justificación (ve a g6)." },
                    { w: { from: [6,7], to: [4,7], san: "h4" }, b: { from: [1,7], to: [2,7], san: "h6" }, instW: "Inicia la agresión. Empuja h4.", instB: "Crea una ruta de escape. Juega h6.", teoriaW: "Una jugada agresiva típica. Amenazas atrapar al alfil negro jugando h5 en la próxima jugada.", teoriaB: "Obligatorio. Si no juegas h6, el peón blanco avanzaría a h5 y atraparía tu alfil sin escapatoria.", errW: "Error: Juega h4 para amenazar h5 y atrapar al alfil.", errB: "Error: Juega h6 para dar una casilla de escape (h7) a tu alfil.", shortErrW: "Pierdes la oportunidad de amenazar al alfil.", shortErrB: "¡Te atraparán el alfil si no haces espacio!" },
                    { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,1], to: [1,3], san: "Nd7" }, instW: "Desarrolla hacia el centro. Caballo a f3.", instB: "Prepara el soporte. Caballo a d7.", teoriaW: "Preparas el desarrollo del alfil de casillas claras y refuerzas la casilla e5.", teoriaB: "Juegas Nd7 en lugar de Nf6 para que, cuando el otro caballo vaya a f6, no te arruinen la estructura de peones si las blancas capturan con Bxf6.", errW: "Error: Desarrolla el caballo a f3.", errB: "Error: Mueve el caballo del flanco de dama a d7.", shortErrW: "Tu flanco de rey necesita desarrollo.", shortErrB: "Nf6 directo es riesgoso; juega primero Nd7." },
                    { w: { from: [4,7], to: [3,7], san: "h5" }, b: { from: [2,6], to: [1,7], san: "Bh7" }, instW: "Gana más espacio. Empuja h5.", instB: "A la guarida. Alfil a h7.", teoriaW: "Fuerzas la posición del alfil enemigo y limitas las opciones de enroque corto de las negras.", teoriaB: "El alfil se retira a su refugio creado en h7. Sigue vivo y controlando casillas vitales.", errW: "Error: Juega h5 para expulsar al alfil.", errB: "Error: Refugia tu alfil en h7.", shortErrW: "No aprovechas la ventaja de espacio en el flanco.", shortErrB: "¡Tu alfil en g6 está atacado!" },
                    { w: { from: [7,5], to: [5,3], san: "Bd3" }, b: { from: [1,7], to: [5,3], san: "Bxd3" }, instW: "Propón el cambio. Alfil a d3.", instB: "Acepta el cambio. Alfil toma en d3.", teoriaW: "Ese alfil negro es demasiado molesto. Ofreces cambiarlo de inmediato para limpiar el tablero.", teoriaB: "No tienes alternativa. Cambias alfiles en d3 para no perder tiempos.", errW: "Error: Desarrolla el alfil a d3 para forzar el cambio.", errB: "Error: Captura el alfil blanco en d3 (Bxd3).", shortErrW: "Debes neutralizar al poderoso alfil de h7 (juega Bd3).", shortErrB: "Debes capturar en d3." },
                    { w: { from: [7,3], to: [5,3], san: "Qxd3" }, b: { from: [0,6], to: [2,5], san: "Ngf6" }, instW: "Recaptura con la Dama. Dama toma en d3.", instB: "Completa el desarrollo menor. Caballo a f6.", teoriaW: "Recapturas y centralizas tu dama preparando un inminente enroque largo o corto.", teoriaB: "Desarrollas el caballo con seguridad. Tu estructura de peones es impecable y no tienes debilidades reales. ¡Fin de la fase inicial!", errW: "Error: Recaptura el alfil con tu Dama (Qxd3).", errB: "Error: Desarrolla tu último caballo a f6.", shortErrW: "Debes recuperar tu pieza (Qxd3).", shortErrB: "Completa el desarrollo de tus caballos (Ngf6)." }
                ]
            },
            7: {
                title: "Defensa India de Rey",
                subtitle: "Tutorial interactivo (Variante Clásica / Mar del Plata).",
                colorTheme: "text-amber-400",
                steps: [
                    { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "Ocupa el centro. Mueve d4.", instB: "Ajedrez Hipermoderno. Caballo a f6.", teoriaW: "Ganas espacio central desde la primera jugada.", teoriaB: "En lugar de ocupar el centro con peones, lo controlas a distancia con tu caballo, impidiendo e4.", errW: "Error: La India de Rey se juega comúnmente contra d4.", errB: "Error: Desarrolla tu caballo a f6.", shortErrW: "Pierdes la iniciativa central de d4.", shortErrB: "Debes controlar el centro con el caballo (Nf6)." },
                    { w: { from: [6,2], to: [4,2], san: "c4" }, b: { from: [1,6], to: [2,6], san: "g6" }, instW: "Expansión total. Juega c4.", instB: "Prepara el fianchetto. Juega g6.", teoriaW: "Reclamas aún más espacio central, preparando el desarrollo de tu caballo a c3.", teoriaB: "Construyes la 'casita' para tu alfil. Es la base de las defensas indias.", errW: "Error: Juega c4 para expandirte en el centro.", errB: "Error: Juega g6 para preparar el desarrollo de tu alfil.", shortErrW: "No aprovechas para ganar espacio central.", shortErrB: "Esa no es la India de Rey (juega g6)." },
                    { w: { from: [7,1], to: [5,2], san: "Nc3" }, b: { from: [0,5], to: [1,6], san: "Bg7" }, instW: "Desarrollo con apoyo central. Caballo a c3.", instB: "El Alfil Indio. Alfil a g7.", teoriaW: "Apoyas fuertemente la casilla d5 y preparas el avance e4.", teoriaB: "Tu alfil es un francotirador desde g7. Controla la gran diagonal oscura.", errW: "Error: Desarrolla el caballo a c3.", errB: "Error: Desarrolla el Alfil a g7 (fianchetto).", shortErrW: "Debes apoyar tu centro con Nc3.", shortErrB: "Debes completar el fianchetto en g7." },
                    { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,3], to: [2,3], san: "d6" }, instW: "El tridente de peones. Juega e4.", instB: "Frena la avalancha. Juega d6.", teoriaW: "¡Tienes el centro perfecto! d4, c4 y e4. Es un bloque de datos masivo.", teoriaB: "Vital. Evitas que las blancas empujen e5, lo cual asfixiaría a tu caballo de f6.", errW: "Error: Aprovecha para jugar e4 y tomar el centro completo.", errB: "Error: Juega d6 para controlar e5.", shortErrW: "Pierdes la oportunidad de tener un centro perfecto.", shortErrB: "¡Permitirás que avancen e5 y te aplasten!" },
                    { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,4], to: [0,6], san: "O-O", castle: true, rFrom: [0,7], rTo: [0,5] }, instW: "Desarrollo del flanco de rey. Caballo a f3.", instB: "Rey a salvo. Enroque corto.", teoriaW: "Desarrollas naturalmente para preparar tu propio enroque.", teoriaB: "El rey negro se esconde rápido detrás del muro de peones y el alfil de g7.", errW: "Error: Desarrolla el caballo a f3.", errB: "Error: Enróca corto para asegurar tu rey.", shortErrW: "Retrasas el desarrollo del flanco de rey.", shortErrB: "El rey debe ir a su búnker (Enroque)." },
                    { w: { from: [7,5], to: [6,4], san: "Be2" }, b: { from: [1,4], to: [3,4], san: "e5" }, instW: "Prepara el enroque. Alfil a e2.", instB: "¡Golpea el centro! Juega e5.", teoriaW: "Una jugada sólida y modesta. Te preparas para poner tu rey a salvo.", teoriaB: "El contraataque hipermoderno. Desafías la fortaleza blanca de inmediato, cuestionando d4.", errW: "Error: Desarrolla el alfil a e2.", errB: "Error: Juega e5 para golpear el centro blanco.", shortErrW: "Desarrolla el alfil para poder enrocar.", shortErrB: "Es hora de atacar el centro (e5)." },
                    { w: { from: [7,4], to: [7,6], san: "O-O", castle: true, rFrom: [7,7], rTo: [7,5] }, b: { from: [0,1], to: [2,2], san: "Nc6" }, instW: "Seguridad confirmada. Enroque corto.", instB: "Máxima tensión. Caballo a c6.", teoriaW: "El rey está a salvo. Dejas que las negras definan la tensión central.", teoriaB: "Desarrollas y atacas d4 de nuevo. ¡Le estás preguntando a las blancas qué harán con su centro!", errW: "Error: Enróca corto (O-O).", errB: "Error: Desarrolla el caballo a c6 atacando d4.", shortErrW: "No debes retrasar más tu enroque.", shortErrB: "Añade presión al centro con Nc6." },
                    { w: { from: [4,3], to: [3,3], san: "d5" }, b: { from: [2,2], to: [1,4], san: "Ne7" }, instW: "Cierra el centro. Avanza a d5.", instB: "Reubica la pieza. Caballo a e7.", teoriaW: "La decisión crítica en la India de Rey. Cierras el centro para lanzar un ataque en el flanco de dama.", teoriaB: "El centro está bloqueado. Reubicas el caballo para preparar el ataque masivo de peones en el flanco de rey.", errW: "Error: Cierra el centro jugando d5.", errB: "Error: Retira el caballo a e7.", shortErrW: "Debes cerrar el centro con d5 (Variante Clásica).", shortErrB: "Tu caballo en c6 está bajo ataque." },
                    { w: { from: [5,5], to: [7,4], san: "Ne1" }, b: { from: [2,5], to: [1,3], san: "Nd7" }, instW: "Maniobra de retirada. Caballo a e1.", instB: "Abre la vía. Caballo a d7.", teoriaW: "Parece contraintuitivo, pero el caballo va a d3 para apoyar c5 (ataque blanco).", teoriaB: "Retiras tu caballo de f6 para permitir que tu peón 'f' avance y lance el ataque contra el rey blanco.", errW: "Error: Mueve el caballo de f3 a e1.", errB: "Error: Mueve el caballo de f6 a d7.", shortErrW: "Debes reubicar el caballo para apoyar tu flanco.", shortErrB: "¡El peón 'f' necesita espacio para avanzar!" },
                    { w: { from: [7,4], to: [5,3], san: "Nd3" }, b: { from: [1,5], to: [3,5], san: "f5" }, instW: "Control central desde atrás. Caballo a d3.", instB: "¡La ruptura clásica! Juega f5.", teoriaW: "El caballo en d3 vigila f4 y prepara la ruptura c5 para destruir el flanco de dama negro.", teoriaB: "¡Comienza el ataque! Buscas abrir líneas en el flanco de rey para asaltar al monarca blanco. Una guerra en dos frentes.", errW: "Error: Mueve el caballo de e1 a d3.", errB: "Error: Juega f5 para lanzar el ataque al rey.", shortErrW: "El caballo debe ir a d3 a organizar el ataque.", shortErrB: "El ataque en el flanco de rey exige jugar f5." }
                ]
            },
            8: {
                title: "Defensa Nimzo-India",
                subtitle: "Tutorial interactivo (Variante Rubinstein).",
                colorTheme: "text-amber-400",
                steps: [
                    { w: { from: [6,3], to: [4,3], san: "d4" }, b: { from: [0,6], to: [2,5], san: "Nf6" }, instW: "Ocupa el centro. Mueve d4.", instB: "Frena la iniciativa. Caballo a f6.", teoriaW: "Ganas espacio central.", teoriaB: "Evitas que las blancas jueguen e4 de forma inmediata.", errW: "Error: Juega d4 para abrir el juego.", errB: "Error: Desarrolla tu caballo a f6.", shortErrW: "Pierdes la iniciativa central de d4.", shortErrB: "Debes controlar el centro con el caballo (Nf6)." },
                    { w: { from: [6,2], to: [4,2], san: "c4" }, b: { from: [1,4], to: [2,4], san: "e6" }, instW: "Expansión total. Juega c4.", instB: "Prepara el alfil. Juega e6.", teoriaW: "Reclamas espacio en el flanco de dama y apoyas el centro.", teoriaB: "Solidificas d5 y abres la diagonal para tu alfil de f8, preparando la idea principal de la Nimzo-India.", errW: "Error: Juega c4 para expandirte.", errB: "Error: Juega e6 para preparar la salida de tu alfil.", shortErrW: "No aprovechas para ganar espacio central.", shortErrB: "Debes liberar a tu Alfil de casillas oscuras." },
                    { w: { from: [7,1], to: [5,2], san: "Nc3" }, b: { from: [0,5], to: [4,1], san: "Bb4" }, instW: "Desarrollo natural. Caballo a c3.", instB: "¡La clavada Nimzo-India! Alfil a b4.", teoriaW: "Desarrollas el caballo para dominar e4 y d5.", teoriaB: "Clavas al caballo, neutralizando su influencia en el centro e impidiendo indirectamente el avance e4 blanco.", errW: "Error: Desarrolla el caballo a c3.", errB: "Error: Juega el Alfil a b4 para clavar al caballo.", shortErrW: "Debes apoyar tu centro con Nc3.", shortErrB: "Esa no es la Nimzo-India (Juega Bb4)." },
                    { w: { from: [6,4], to: [5,4], san: "e3" }, b: { from: [0,4], to: [0,6], san: "O-O", castle: true, rFrom: [0,7], rTo: [0,5] }, instW: "Sólida defensa. Juega e3.", instB: "Seguridad rápida. Enroque corto.", teoriaW: "Variante Rubinstein. Fortaleces d4 y preparas el desarrollo tranquilo de tu alfil a d3.", teoriaB: "Tu rey está a salvo mientras el centro sigue en un tenso equilibrio.", errW: "Error: Juega e3 para solidificar el centro.", errB: "Error: Enróca corto.", shortErrW: "Tu centro necesita soporte con e3.", shortErrB: "El rey debe resguardarse rápidamente." },
                    { w: { from: [7,5], to: [5,3], san: "Bd3" }, b: { from: [1,3], to: [3,3], san: "d5" }, instW: "Desarrollo activo. Alfil a d3.", instB: "Golpea el centro. Juega d5.", teoriaW: "El alfil se sitúa en su mejor diagonal apuntando hacia h7.", teoriaB: "Ahora que estás enrocado, luchas directamente por el control de las casillas centrales.", errW: "Error: Desarrolla el Alfil a d3.", errB: "Error: Juega d5 para golpear el centro.", shortErrW: "El Alfil debe ir a su casilla natural (d3).", shortErrB: "Es momento de golpear el centro (d5)." },

        function handleCardClick(id, name) {
            // Verifica si el módulo está en nuestra base de datos (OPENING_MODULES)
            if (OPENING_MODULES[id]) { 
                const module = OPENING_MODULES[id];
                currentSteps = module.steps; // Carga los pasos dinámicamente
                
                // Actualiza el Título dinámicamente
                const titleContainer = document.getElementById('title-container');
                titleContainer.innerHTML = `
                    <h1 class="text-2xl md:text-3xl font-bold ${module.colorTheme}">${module.title} <span class="text-slate-500 text-xl font-mono">v1.0</span></h1>
                    <p class="text-slate-400 text-sm md:text-base">${module.subtitle}</p>
                `;

                // Cambiar las Vistas
                document.getElementById('menu-view').classList.add('hidden');
                document.getElementById('game-view').classList.remove('hidden');
                document.getElementById('game-view').classList.add('flex');
                
                initGame(); // Inicia la lógica del tablero con los nuevos pasos
            } else {
                showUnderConstruction(name);
            }
        }

        function backToMenu() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('flex');
            document.getElementById('menu-view').classList.remove('hidden');
            clearTimeout(errorBannerTimeout);
        }

        function showUnderConstruction(openingName) {
            const toast = document.getElementById('toast-notification');
            const toastMessage = document.getElementById('toast-message');
            toastMessage.textContent = `El módulo "${openingName}" está en construcción.`;
            
            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toast.classList.remove('toast-exit');
            }

            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');

            toastTimeout = setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => {
                    if(toast.classList.contains('toast-exit')) {
                        toast.classList.add('hidden');
                        toast.classList.remove('toast-exit');
                    }
                }, 300);
            }, 3000);
        }

        function toggleLanguageBtn() {
            const btn = document.getElementById('lang-btn');
            const isActive = btn.classList.contains('bg-emerald-600');
            
            if (isActive) {
                btn.classList.remove('bg-emerald-600', 'text-white', 'border-emerald-500');
                btn.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
            } else {
                btn.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
                btn.classList.add('bg-emerald-600', 'text-white', 'border-emerald-500');
            }
        }

        // ==========================================
        // LÓGICA DEL JUEGO
        // ==========================================
        const PIECES_URL = {
            'P': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
            'N': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
            'B': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',

            'K': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
            'p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
            'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
            'b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
            'r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
            'q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
            'k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
        };

        const INITIAL_BOARD = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        let boardState = [];
        let userRole = 'w';
        let currentStep = 0;
        let isWhiteTurn = true;
        let dragFrom = null;
        let errorBannerTimeout;

        function logConsole(msg, type="info") {
            const consoleEl = document.getElementById('feedback-console');
            const div = document.createElement('div');
            if(type === 'error') div.className = 'text-rose-400 font-bold fade-in';
            else if(type === 'success') div.className = 'text-emerald-400 fade-in';
            else div.className = 'text-slate-400 fade-in';
            div.textContent = `>> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function initGame() {
            boardState = INITIAL_BOARD.map(row => [...row]);
            currentStep = 0;
            isWhiteTurn = true;
            
            const consoleEl = document.getElementById('feedback-console');
            consoleEl.innerHTML = '';
            logConsole("Cargando módulos de sistema y validación...");
            logConsole("Esperando entrada del usuario...");
            
            updateUI();
            renderBoard();

            if (userRole === 'b' && isWhiteTurn) {
                setTimeout(autoPlayOpponent, 800);
            }
        }

        function switchRole(role) {
            userRole = role;
            document.getElementById('btn-white').className = role === 'w' 
                ? 'px-4 py-2 rounded-md bg-emerald-600 text-white font-semibold transition-colors' 
                : 'px-4 py-2 rounded-md text-slate-300 hover:bg-slate-700 font-semibold transition-colors';
            
            document.getElementById('btn-black').className = role === 'b' 
                ? 'px-4 py-2 rounded-md bg-emerald-600 text-white font-semibold transition-colors' 
                : 'px-4 py-2 rounded-md text-slate-300 hover:bg-slate-700 font-semibold transition-colors';
            
            logConsole(`Modo cambiado a jugador: ${role === 'w' ? 'Blancas' : 'Negras'}`);
            initGame();
        }

        function getColName(c) { return String.fromCharCode(97 + c); }
        function getRowName(r) { return 8 - r; }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            const rows = userRole === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
            const cols = userRole === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];

            for (let r of rows) {
                for (let c of cols) {
                    const isLight = (r + c) % 2 === 0;
                    const square = document.createElement('div');
                    square.className = `square ${isLight ? 'light' : 'dark'}`;
                    square.dataset.row = r;
                    square.dataset.col = c;

                    if (userRole === 'w') {
                        if (c === 0) square.innerHTML += `<div class="coord-row">${getRowName(r)}</div>`;
                        if (r === 7) square.innerHTML += `<div class="coord-col">${getColName(c)}</div>`;
                    } else {
                        if (c === 7) square.innerHTML += `<div class="coord-row">${getRowName(r)}</div>`;
                        if (r === 0) square.innerHTML += `<div class="coord-col">${getColName(c)}</div>`;
                    }

                    const pieceCode = boardState[r][c];
                    if (pieceCode) {
                        const piece = document.createElement('div');
                        piece.className = 'piece';
                        piece.style.backgroundImage = `url(${PIECES_URL[pieceCode]})`;
                        piece.draggable = true;
                        
                        piece.addEventListener('dragstart', (e) => {
                            dragFrom = {r, c};
                            const isPieceWhite = pieceCode === pieceCode.toUpperCase();
                            const isUserTurn = (userRole === 'w' && isWhiteTurn && isPieceWhite) || 
                                               (userRole === 'b' && !isWhiteTurn && !isPieceWhite);
                            if(!isUserTurn) {
                                e.preventDefault();
                                return;
                            }
                        });
                        square.appendChild(piece);
                    }

                    square.addEventListener('dragover', (e) => e.preventDefault());
                    square.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if(!dragFrom) return;
                        handleMoveAttempt(dragFrom.r, dragFrom.c, r, c);
                        dragFrom = null;
                    });

                    boardEl.appendChild(square);
                }
            }
        }

        function handleMoveAttempt(fr, fc, tr, tc) {
            if (currentStep >= currentSteps.length) return;

            const step = currentSteps[currentStep];
            const expectedMove = (userRole === 'w') ? step.w : step.b;

            if (fr === expectedMove.from[0] && fc === expectedMove.from[1] &&
                tr === expectedMove.to[0] && tc === expectedMove.to[1]) {
                
                logConsole(`Jugada correcta ejecutada: ${expectedMove.san}`, "success");
                executeMove(fr, fc, tr, tc, expectedMove);
                
                if (userRole === 'w') {
                    isWhiteTurn = false;
                    updateUI();
                    if(currentStep < currentSteps.length) setTimeout(autoPlayOpponent, 700);
                } else {
                    isWhiteTurn = true;
                    currentStep++;
                    updateUI();
                    if(currentStep < currentSteps.length) setTimeout(autoPlayOpponent, 700);
                    else logConsole("¡Felicidades! Has completado la línea teórica principal.", "success");
                }
                
            } else {
                const errText = userRole === 'w' ? step.errW : step.errB;
                const shortErrText = userRole === 'w' ? step.shortErrW : step.shortErrB;
                
                logConsole(errText, "error");
                highlightError(tr, tc);
                showErrorBanner(shortErrText); 
            }
        }

        function autoPlayOpponent() {
            if (currentStep >= currentSteps.length) {
                logConsole("¡Tutorial completado!", "success");
                return;
            }

            const step = currentSteps[currentStep];
            const oppMove = userRole === 'w' ? step.b : step.w;
            
            logConsole(`El sistema responde: ${oppMove.san}`);
            executeMove(oppMove.from[0], oppMove.from[1], oppMove.to[0], oppMove.to[1], oppMove);
            
            if (userRole === 'w') {
                isWhiteTurn = true;
                currentStep++;
            } else {
                isWhiteTurn = false;
            }
            updateUI();
        }

        function executeMove(fr, fc, tr, tc, moveData) {
            boardState[tr][tc] = boardState[fr][fc];
            boardState[fr][fc] = '';

            // Lógica para capturas o enroques
            if (moveData.castle) {
                boardState[moveData.rTo[0]][moveData.rTo[1]] = boardState[moveData.rFrom[0]][moveData.rFrom[1]];
                boardState[moveData.rFrom[0]][moveData.rFrom[1]] = '';
            }

            renderBoard();
        }

        function updateUI() {
            const levelIndEl = document.getElementById('level-indicator');
            const progressEl = document.getElementById('progress-bar');
            const instTextEl = document.getElementById('instruction-text');
            const theoryTextEl = document.getElementById('theory-text');
            const turnIndEl = document.getElementById('turn-indicator');

            if(currentStep >= currentSteps.length) {
                levelIndEl.textContent = 10;
                progressEl.style.width = '100%';
                instTextEl.textContent = "Has dominado los primeros 10 movimientos de este sistema.";
                theoryTextEl.textContent = "Has ejecutado las instrucciones algorítmicas correctamente. El tablero está listo para el medio juego.";
                turnIndEl.textContent = "Tutorial Finalizado";
                turnIndEl.className = "text-sm font-mono bg-emerald-900 px-3 py-1 rounded text-emerald-300";
                return;
            }

            const lvl = currentStep + 1;
            levelIndEl.textContent = lvl;
            progressEl.style.width = `${(lvl / 10) * 100}%`;

            const step = currentSteps[currentStep];
            const isMyTurn = (userRole === 'w' && isWhiteTurn) || (userRole === 'b' && !isWhiteTurn);
            
            if (isMyTurn) {
                turnIndEl.textContent = "Tu turno";
                turnIndEl.className = "text-sm font-mono bg-blue-900 px-3 py-1 rounded text-blue-300 animate-pulse";
                instTextEl.textContent = userRole === 'w' ? step.instW : step.instB;
                theoryTextEl.textContent = userRole === 'w' ? step.teoriaW : step.teoriaB;
            } else {
                turnIndEl.textContent = "Calculando...";
                turnIndEl.className = "text-sm font-mono bg-slate-700 px-3 py-1 rounded text-slate-300";
                instTextEl.textContent = "Espera el movimiento del oponente...";
                theoryTextEl.textContent = "Analizando base de datos de aperturas...";
            }
        }

        function highlightError(r, c) {
            const square = document.querySelector(`.square[data-row="${r}"][data-col="${c}"]`);
            if(square) {
                square.classList.add('error-highlight');
                setTimeout(() => square.classList.remove('error-highlight'), 500);
            }
        }

        function showErrorBanner(msg) {
            const titleContainer = document.getElementById('title-container');
            const errorBanner = document.getElementById('error-banner');
            const errorText = document.getElementById('error-banner-text');

            errorText.textContent = msg;
            
            titleContainer.classList.add('opacity-0');
            errorBanner.classList.remove('opacity-0', 'pointer-events-none');
            
            clearTimeout(errorBannerTimeout);
            
            errorBannerTimeout = setTimeout(() => {
                titleContainer.classList.remove('opacity-0');
                errorBanner.classList.add('opacity-0', 'pointer-events-none');
            }, 3500);
        }

        // Iniciar construyendo el menú principal
        window.onload = renderCards;

    </script>
</body>
</html>
