<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Aperturas de Ajedrez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        }

        /* --- Estilos del Menú --- */
        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { transform: translate(-50%, 0); opacity: 1; }
            to { transform: translate(-50%, 20px); opacity: 0; }
        }

        .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: fadeOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .opening-card { transition: all 0.2s ease-in-out; }
        .opening-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.15), 0 8px 10px -6px rgba(16, 185, 129, 0.1);
        }

        /* --- Estilos del Tablero y Juego --- */
        .chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border: 4px solid #334155;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .square.light { background-color: #e2e8f0; }
        .square.dark { background-color: #64748b; }
        .square.highlight { background-color: rgba(234, 179, 8, 0.5); }
        .square.error-highlight { background-color: rgba(239, 68, 68, 0.6); }

        .piece {
            width: 80%;
            height: 80%;
            cursor: grab;
            background-size: cover;
            background-position: center;
            user-select: none;
            filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.4));
            transition: transform 0.1s;
        }
        .piece:active { cursor: grabbing; transform: scale(1.1); }

        .coord-col {
            position: absolute; bottom: 2px; right: 4px; font-size: 10px; font-weight: bold; color: #1e293b;
        }
        .coord-row {
            position: absolute; top: 2px; left: 4px; font-size: 10px; font-weight: bold; color: #1e293b;
        }
        .square.dark .coord-col, .square.dark .coord-row { color: #f1f5f9; }

        .terminal {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            background-color: #020617;
            border: 1px solid #334155;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center relative pb-24">

    <!-- Selector de Idioma -->
    <select id="lang-select" onchange="changeLanguage(this.value)" class="absolute top-4 right-4 md:top-6 md:right-8 bg-slate-800 text-emerald-400 border border-slate-700 focus:border-emerald-500 px-4 py-2 rounded-lg font-bold text-sm outline-none transition-colors z-50 cursor-pointer shadow-lg shadow-black/20">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="it">Italiano</option>
        <option value="la">Latina</option>
        <option value="eo">Esperanto</option>
        <option value="tok">Toki Pona</option>
    </select>

    <!-- ==================== VISTA DEL MENÚ ==================== -->
    <div id="menu-view" class="w-full flex flex-col items-center w-full max-w-7xl">

                Aperturas de ajedrez

                Selecciona un sistema

        <main class="w-full">

            </div>
        </main>
    </div>

    <!-- Notificación Toast -->
    <div id="toast-notification" class="fixed bottom-8 left-1/2 -translate-x-1/2 hidden z-50">

            <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>

    </div>


    <!-- ==================== VISTA DEL JUEGO ==================== -->

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>

                </button>

                <!-- Título Principal del Juego -->
                <div id="title-container" class="transition-opacity duration-300 w-full">
                    <!-- Contenido inyectado por JS -->
                </div>
                
                <!-- Banner de Error Oculto -->
                <div id="error-banner" class="opacity-0 pointer-events-none absolute left-[3.5rem] md:left-[7.5rem] top-0 w-[calc(100%-3.5rem)] md:w-4/5 h-full bg-rose-600 rounded-lg flex items-center px-4 shadow-lg shadow-rose-900/50 transition-opacity duration-300 z-10">
                    <div class="flex items-center gap-3">
                        <svg class="w-8 h-8 text-white shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <div>
                            <h2 id="ui-wrong-move" class="text-xl font-bold text-white leading-tight">¡Movimiento Incorrecto!</h2>
                            <p id="error-banner-text" class="text-rose-100 text-sm leading-tight">Razón del error...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2 bg-slate-800 p-1 rounded-lg border border-slate-700 shrink-0 z-20">
                <button id="btn-white" onclick="switchRole('w')" class="px-4 py-2 rounded-md bg-emerald-600 text-white font-semibold transition-colors">Jugar Blancas</button>
                <button id="btn-black" onclick="switchRole('b')" class="px-4 py-2 rounded-md text-slate-300 hover:bg-slate-700 font-semibold transition-colors">Jugar Negras</button>
            </div>
        </header>

        <main class="w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Tablero Section -->
            <div class="flex justify-center items-start">
                <div id="board" class="chessboard">
                    <!-- Se inyecta via JS -->
                </div>
            </div>

            <!-- Panel de Control y Teoría -->
            <div class="flex flex-col gap-4 w-full">
                <!-- Progreso -->
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg">
                    <div class="flex justify-between items-end mb-2">
                        <h2 class="text-xl font-bold text-white"><span id="ui-level">Nivel</span> <span id="level-indicator">1</span> / 10</h2>
                        <span id="turn-indicator" class="text-sm font-mono bg-slate-900 px-3 py-1 rounded text-emerald-400">Turno: Tu turno</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-2.5">
                        <div id="progress-bar" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500" style="width: 10%"></div>
                    </div>
                </div>

                <!-- Instrucción Actual -->

                    <div class="mt-4 bg-slate-900/50 p-4 rounded-lg border border-slate-700">

                        <p id="theory-text" class="text-sm text-slate-300 italic"></p>
                    </div>
                </div>

                <div class="terminal rounded-xl p-4 shadow-lg h-48 overflow-y-auto flex flex-col gap-2" id="feedback-console">
                    <!-- Textos inyectados via JS -->
                </div>
            </div>
        </main>
    </div>

                    { w: { from: [6,4], to: [4,4], san: "e4" }, b: { from: [1,6], to: [2,6], san: "g6" }, instW: "Ocupa e4.", instB: "Prepara fianchetto. g6.", teoriaW: "Centro inmenso.", teoriaB: "Alfil a la gran diagonal.", errW: "Juega e4.", errB: "Juega g6.", shortErrW: "Juega e4.", shortErrB: "Juega g6." },
                    { w: { from: [7,6], to: [5,5], san: "Nf3" }, b: { from: [0,5], to: [1,6], san: "Bg7" }, instW: "Desarrollo. Nf3.", instB: "Alfil g7.", teoriaW: "Control e5.", teoriaB: "Puntería al flanco dama.", errW: "Juega Nf3.", errB: "Juega Bg7.", shortErrW: "Juega Nf3.", shortErrB: "Juega Bg7." },
                    { w: { from: [7,5], to: [6,4], san: "Be2" }, b: { from: [0,4], to: [0,6], san: "O-O", castle: true, rFrom: [0,7], rTo: [0,5] }, instW: "Prepara enroque. Be2.", instB: "Enroque corto.", teoriaW: "Desarrollo metódico.", teoriaB: "Seguridad.", errW: "Juega Be2.", errB: "Enróca.", shortErrW: "Juega Be2.", shortErrB: "Enróca." },
                    { w: { from: [7,4], to: [7,6], san: "O-O", castle: true, rFrom: [7,7], rTo: [7,5] }, b: { from: [1,0], to: [2,0], san: "a6" }, instW: "Enroque corto.", instB: "Profilaxis. a6.", teoriaW: "Rey a salvo.", teoriaB: "Prepara b5.", errW: "Enróca.", errB: "Juega a6.", shortErrW: "Enróca.", shortErrB: "Juega a6." },
                    { w: { from: [6,0], to: [4,0], san: "a4" }, b: { from: [0,5], to: [0,4], san: "Re8" }, instW: "Frena b5. a4.", instB: "Torre activa. Re8.", teoriaW: "Domina expansión.", teoriaB: "Presiona e4.", errW: "Juega a4.", errB: "Juega Re8.", shortErrW: "Juega a4.", shortErrB: "Juega Re8." }
                ]
            }
        };

        // ==========================================
        // LÓGICA DEL MENÚ Y NAVEGACIÓN
        // ==========================================
        const chessOpenings = [
            { id: 1, name: { es: "Apertura Ruy López", en: "Ruy Lopez", it: "Partita Spagnola", la: "Apertura Hispanica", eo: "Hispana Malfermo", tok: "open Lusi Lope" }, type: { es: "Abierta", en: "Open", it: "Aperta", la: "Aperta", eo: "Malfermita", tok: "open" }, color: "emerald" },
            { id: 2, name: { es: "Defensa Siciliana", en: "Sicilian Defense", it: "Difesa Siciliana", la: "Defensio Siciliana", eo: "Sicilia Defendo", tok: "awen Sisi" }, type: { es: "Semi-abierta", en: "Semi-open", it: "Semi-aperta", la: "Semi-aperta", eo: "Duon-malfermita", tok: "open lili" }, color: "blue" },
            { id: 3, name: { es: "Gambito de Dama", en: "Queen's Gambit", it: "Gambetto di Donna", la: "Sacrificium Reginae", eo: "Dama Gambito", tok: "pana meli" }, type: { es: "Cerrada", en: "Closed", it: "Chiusa", la: "Clausa", eo: "Fermita", tok: "pini" }, color: "purple" },
            { id: 4, name: { es: "Defensa Francesa", en: "French Defense", it: "Difesa Francese", la: "Defensio Gallica", eo: "Franca Defendo", tok: "awen Kanse" }, type: { es: "Semi-abierta", en: "Semi-open", it: "Semi-aperta", la: "Semi-aperta", eo: "Duon-malfermita", tok: "open lili" }, color: "rose" },
            { id: 5, name: { es: "Apertura Italiana", en: "Italian Game", it: "Partita Italiana", la: "Apertura Italica", eo: "Itala Ludo", tok: "open Itali" }, type: { es: "Abierta", en: "Open", it: "Aperta", la: "Aperta", eo: "Malfermita", tok: "open" }, color: "emerald" },
            { id: 6, name: { es: "Defensa Caro-Kann", en: "Caro-Kann", it: "Caro-Kann", la: "Defensio Caro-Kann", eo: "Caro-Kann Defendo", tok: "awen Kalo Kan" }, type: { es: "Semi-abierta", en: "Semi-open", it: "Semi-aperta", la: "Semi-aperta", eo: "Duon-malfermita", tok: "open lili" }, color: "blue" },
            { id: 7, name: { es: "Defensa India de Rey", en: "King's Indian", it: "Est-Indiana", la: "Defensio Indica Regis", eo: "Reĝhinda Defendo", tok: "awen pi jan lawa" }, type: { es: "Semi-cerrada", en: "Semi-closed", it: "Semi-chiusa", la: "Semi-clausa", eo: "Duon-fermita", tok: "pini lili" }, color: "amber" },
            { id: 8, name: "Defensa Nimzo-India", type: "Semi-cerrada", color: "amber" },
            { id: 9, name: "Defensa Eslava", type: "Cerrada", color: "purple" },
            { id: 10, name: "Apertura Inglesa", type: "Flanco", color: "cyan" },
            { id: 11, name: "Defensa Pirc", type: "Semi-abierta", color: "blue" },
            { id: 12, name: "Apertura Escocesa", type: "Abierta", color: "emerald" },
            { id: 13, name: "Defensa Alekhine", type: "Semi-abierta", color: "blue" },
            { id: 14, name: "Gambito de Rey", type: "Abierta", color: "emerald" },
            { id: 15, name: "Defensa Holandesa", type: "Semi-cerrada", color: "amber" },
            { id: 16, name: "Sistema Londres", type: "Cerrada", color: "purple" },
            { id: 17, name: "Defensa Escandinava", type: "Semi-abierta", color: "blue" },
            { id: 18, name: "Apertura Reti", type: "Flanco", color: "cyan" },
            { id: 19, name: "Defensa Grünfeld", type: "Semi-cerrada", color: "amber" },
            { id: 20, name: "Defensa Benoni", type: "Semi-cerrada", color: "amber" }
        ];

        let toastTimeout;
        let currentSteps = []; 

        function getColorClasses(colorName) {
            const colors = {
                emerald: 'border-emerald-500/30 group-hover:border-emerald-400 text-emerald-400 bg-emerald-500/10',
                blue: 'border-blue-500/30 group-hover:border-blue-400 text-blue-400 bg-blue-500/10',
                purple: 'border-purple-500/30 group-hover:border-purple-400 text-purple-400 bg-purple-500/10',
                rose: 'border-rose-500/30 group-hover:border-rose-400 text-rose-400 bg-rose-500/10',
                amber: 'border-amber-500/30 group-hover:border-amber-400 text-amber-400 bg-amber-500/10',
                cyan: 'border-cyan-500/30 group-hover:border-cyan-400 text-cyan-400 bg-cyan-500/10'
            };
            return colors[colorName] || colors.emerald;
        }

        function renderCards() {
            const gridContainer = document.getElementById('openings-grid');
            gridContainer.innerHTML = ''; 
            
            chessOpenings.forEach(opening => {
                const colorClasses = getColorClasses(opening.color);
                const borderClass = colorClasses.split(' ')[0];
                const hoverBorderClass = colorClasses.split(' ')[1];
                const textColorClass = colorClasses.split(' ')[2];
                const bgColorClass = colorClasses.split(' ')[3];

                const card = document.createElement('button');
                card.className = `opening-card group w-full text-left bg-slate-800/80 backdrop-blur-sm border ${borderClass} ${hoverBorderClass} rounded-xl p-5 relative overflow-hidden flex flex-col justify-between min-h-[120px]`;
                
                card.onclick = () => handleCardClick(opening.id, getT(opening.name));

                card.innerHTML = `
                    <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                        <svg class="w-12 h-12 ${textColorClass}" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C10.34 2 9 3.34 9 5c0 1.18.68 2.2 1.67 2.73C9.36 8.58 8.5 10.18 8.5 12c0 1.25.42 2.4 1.12 3.32L8 18H6v4h12v-4h-2l-1.62-2.68c.7-.92 1.12-2.07 1.12-3.32 0-1.82-.86-3.42-2.17-4.27C14.32 7.2 15 6.18 15 5c0-1.66-1.34-3-3-3zm0 2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-1.5 5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3c-.83 0-1.5-.67-1.5-1.5S9.67 9 10.5 9zm-1.8 4h6.6c.3 0 .6.2.7.5l1.5 2.5H6.5l1.5-2.5c.1-.3.4-.5.7-.5zM8 20h8v2H8v-2z"/>
                        </svg>
                    </div>
                    <div class="relative z-10">
                        <span class="inline-block px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${textColorClass} ${bgColorClass} mb-3 border ${borderClass}">
                            ${getT(opening.type)}
                        </span>
                        <h2 class="text-xl font-bold text-slate-100 group-hover:text-white leading-tight">
                            ${getT(opening.name)}
                        </h2>
                    </div>
                    <div class="relative z-10 mt-4 flex items-center text-sm font-medium text-slate-500 group-hover:text-emerald-400 transition-colors">
                        <span>${getT(UI_TEXT.startModule)}</span>
                        <svg class="w-4 h-4 ml-1 opacity-0 group-hover:opacity-100 transition-opacity transform -translate-x-2 group-hover:translate-x-0 duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        function handleCardClick(id, name) {
            if (OPENING_MODULES[id]) { 
                const module = OPENING_MODULES[id];
                currentSteps = module.steps; 
                
                document.getElementById('game-view').dataset.activeId = id;

                const titleContainer = document.getElementById('title-container');
                titleContainer.innerHTML = `
                    <h1 class="text-2xl md:text-3xl font-bold ${module.colorTheme}">${getT(module.title)} <span class="text-slate-500 text-xl font-mono">v1.0</span></h1>
                    <p class="text-slate-400 text-sm md:text-base">${getT(module.subtitle)}</p>
                `;

                document.getElementById('menu-view').classList.add('hidden');
                document.getElementById('game-view').classList.remove('hidden');
                document.getElementById('game-view').classList.add('flex');
                
                initGame(); 
            } else {
                showUnderConstruction(name);
            }
        }

        function backToMenu() {
            document.getElementById('game-view').dataset.activeId = "";
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('flex');
            document.getElementById('menu-view').classList.remove('hidden');
            clearTimeout(errorBannerTimeout);
            
            // Ocultar el banner de error y restaurar el título al volver al menú
            const titleContainer = document.getElementById('title-container');
            const errorBanner = document.getElementById('error-banner');
            if (titleContainer) titleContainer.classList.remove('opacity-0');
            if (errorBanner) errorBanner.classList.add('opacity-0', 'pointer-events-none');
        }

        function showUnderConstruction(openingName) {
            const toast = document.getElementById('toast-notification');
            const toastMessage = document.getElementById('toast-message');
            toastMessage.textContent = `${getT(UI_TEXT.underConstText)} (${openingName})`;
            
            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toast.classList.remove('toast-exit');
            }

            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');

            toastTimeout = setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => {
                    if(toast.classList.contains('toast-exit')) {
                        toast.classList.add('hidden');
                        toast.classList.remove('toast-exit');
                    }
                }, 300);
            }, 3000);
        }

        // ==========================================
        // LÓGICA DEL JUEGO
        // ==========================================
        const PIECES_URL = {
            'P': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
            'N': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
            'B': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
            'R': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
            'Q': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
            'K': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
            'p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
            'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
            'b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
            'r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
            'q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
            'k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
        };

        const INITIAL_BOARD = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];

        let boardState = [];
        let userRole = 'w';
        let currentStep = 0;
        let isWhiteTurn = true;
        let dragFrom = null;
        let errorBannerTimeout;

        function logConsole(msg, type="info") {
            const consoleEl = document.getElementById('feedback-console');
            const div = document.createElement('div');
            if(type === 'error') div.className = 'text-rose-400 font-bold fade-in';
            else if(type === 'success') div.className = 'text-emerald-400 fade-in';
            else div.className = 'text-slate-400 fade-in';
            div.textContent = `>> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function initGame() {
            boardState = INITIAL_BOARD.map(row => [...row]);
            currentStep = 0;
            isWhiteTurn = true;
            
            const consoleEl = document.getElementById('feedback-console');
            consoleEl.innerHTML = '';
            
            updateUI();
            renderBoard();

            if (userRole === 'b' && isWhiteTurn) {
                setTimeout(autoPlayOpponent, 800);
            }
        }

        function switchRole(role) {
            userRole = role;
            document.getElementById('btn-white').className = role === 'w' 
                ? 'px-4 py-2 rounded-md bg-emerald-600 text-white font-semibold transition-colors' 
                : 'px-4 py-2 rounded-md text-slate-300 hover:bg-slate-700 font-semibold transition-colors';
            
            document.getElementById('btn-black').className = role === 'b' 
                ? 'px-4 py-2 rounded-md bg-emerald-600 text-white font-semibold transition-colors' 
                : 'px-4 py-2 rounded-md text-slate-300 hover:bg-slate-700 font-semibold transition-colors';
            
            initGame();
        }

        function getColName(c) { return String.fromCharCode(97 + c); }
        function getRowName(r) { return 8 - r; }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            const rows = userRole === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];
            const cols = userRole === 'w' ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];

            for (let r of rows) {
                for (let c of cols) {
                    const isLight = (r + c) % 2 === 0;
                    const square = document.createElement('div');
                    square.className = `square ${isLight ? 'light' : 'dark'}`;
                    square.dataset.row = r;
                    square.dataset.col = c;

                    if (userRole === 'w') {
                        if (c === 0) square.innerHTML += `<div class="coord-row">${getRowName(r)}</div>`;
                        if (r === 7) square.innerHTML += `<div class="coord-col">${getColName(c)}</div>`;
                    } else {
                        if (c === 7) square.innerHTML += `<div class="coord-row">${getRowName(r)}</div>`;
                        if (r === 0) square.innerHTML += `<div class="coord-col">${getColName(c)}</div>`;
                    }

                    const pieceCode = boardState[r][c];
                    if (pieceCode) {
                        const piece = document.createElement('div');
                        piece.className = 'piece';
                        piece.style.backgroundImage = `url(${PIECES_URL[pieceCode]})`;
                        piece.draggable = true;
                        
                        piece.addEventListener('dragstart', (e) => {
                            dragFrom = {r, c};
                            const isPieceWhite = pieceCode === pieceCode.toUpperCase();
                            const isUserTurn = (userRole === 'w' && isWhiteTurn && isPieceWhite) || 
                                               (userRole === 'b' && !isWhiteTurn && !isPieceWhite);
                            if(!isUserTurn) {
                                e.preventDefault();
                                return;
                            }
                        });
                        square.appendChild(piece);
                    }

                    square.addEventListener('dragover', (e) => e.preventDefault());
                    square.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if(!dragFrom) return;
                        handleMoveAttempt(dragFrom.r, dragFrom.c, r, c);
                        dragFrom = null;
                    });

                    boardEl.appendChild(square);
                }
            }
        }

        function handleMoveAttempt(fr, fc, tr, tc) {
            if (currentStep >= currentSteps.length) return;

            const step = currentSteps[currentStep];
            const expectedMove = (userRole === 'w') ? step.w : step.b;

            if (fr === expectedMove.from[0] && fc === expectedMove.from[1] &&
                tr === expectedMove.to[0] && tc === expectedMove.to[1]) {
                
                logConsole(`${expectedMove.san}`, "success");
                executeMove(fr, fc, tr, tc, expectedMove);
                
                if (userRole === 'w') {
                    isWhiteTurn = false;
                    updateUI();
                    if(currentStep < currentSteps.length) setTimeout(autoPlayOpponent, 700);
                } else {
                    isWhiteTurn = true;
                    currentStep++;
                    updateUI();
                    if(currentStep < currentSteps.length) setTimeout(autoPlayOpponent, 700);
                    else logConsole(getT(UI_TEXT.congratulations), "success");
                }
                
            } else {
                const errText = userRole === 'w' ? step.errW : step.errB;
                const shortErrText = userRole === 'w' ? step.shortErrW : step.shortErrB;
                
                logConsole(getT(errText), "error");
                highlightError(tr, tc);
                showErrorBanner(getT(shortErrText)); 
            }
        }

        function autoPlayOpponent() {
            if (currentStep >= currentSteps.length) {
                logConsole(getT(UI_TEXT.tutEnded), "success");
                return;
            }

            const step = currentSteps[currentStep];
            const oppMove = userRole === 'w' ? step.b : step.w;
            
            logConsole(`>> ${oppMove.san}`);
            executeMove(oppMove.from[0], oppMove.from[1], oppMove.to[0], oppMove.to[1], oppMove);
            
            if (userRole === 'w') {
                isWhiteTurn = true;
                currentStep++;
            } else {
                isWhiteTurn = false;
            }
            updateUI();
        }

        function executeMove(fr, fc, tr, tc, moveData) {
            boardState[tr][tc] = boardState[fr][fc];
            boardState[fr][fc] = '';

            if (moveData.castle) {
                boardState[moveData.rTo[0]][moveData.rTo[1]] = boardState[moveData.rFrom[0]][moveData.rFrom[1]];
                boardState[moveData.rFrom[0]][moveData.rFrom[1]] = '';
            }

            renderBoard();
        }

        function updateUI() {
            const levelIndEl = document.getElementById('level-indicator');
            const progressEl = document.getElementById('progress-bar');
            const instTextEl = document.getElementById('instruction-text');
            const theoryTextEl = document.getElementById('theory-text');
            const turnIndEl = document.getElementById('turn-indicator');

            if(currentStep >= currentSteps.length) {
                levelIndEl.textContent = 10;
                progressEl.style.width = '100%';
                instTextEl.textContent = getT(UI_TEXT.completedInst);
                theoryTextEl.textContent = getT(UI_TEXT.completedTheory);
                turnIndEl.textContent = getT(UI_TEXT.tutEnded);
                turnIndEl.className = "text-sm font-mono bg-emerald-900 px-3 py-1 rounded text-emerald-300";
                return;
            }

            const lvl = currentStep + 1;
            levelIndEl.textContent = lvl;
            progressEl.style.width = `${(lvl / 10) * 100}%`;

            const step = currentSteps[currentStep];
            const isMyTurn = (userRole === 'w' && isWhiteTurn) || (userRole === 'b' && !isWhiteTurn);
            
            if (isMyTurn) {
                turnIndEl.textContent = getT(UI_TEXT.turnUser);
                turnIndEl.className = "text-sm font-mono bg-blue-900 px-3 py-1 rounded text-blue-300 animate-pulse";
                instTextEl.textContent = userRole === 'w' ? getT(step.instW) : getT(step.instB);
                theoryTextEl.textContent = userRole === 'w' ? getT(step.teoriaW) : getT(step.teoriaB);
            } else {
                turnIndEl.textContent = getT(UI_TEXT.turnOpp);
                turnIndEl.className = "text-sm font-mono bg-slate-700 px-3 py-1 rounded text-slate-300";
                instTextEl.textContent = "...";
                theoryTextEl.textContent = "...";
            }
        }

        function highlightError(r, c) {
            const square = document.querySelector(`.square[data-row="${r}"][data-col="${c}"]`);
            if(square) {
                square.classList.add('error-highlight');
                setTimeout(() => square.classList.remove('error-highlight'), 500);
            }
        }

        function showErrorBanner(msg) {
            const titleContainer = document.getElementById('title-container');
            const errorBanner = document.getElementById('error-banner');
            const errorText = document.getElementById('error-banner-text');

            errorText.textContent = msg;
            
            titleContainer.classList.add('opacity-0');
            errorBanner.classList.remove('opacity-0', 'pointer-events-none');
            
            clearTimeout(errorBannerTimeout);
            
            errorBannerTimeout = setTimeout(() => {
                titleContainer.classList.remove('opacity-0');
                errorBanner.classList.add('opacity-0', 'pointer-events-none');
            }, 3500);
        }

        // Inicializar
        window.onload = () => {
            changeLanguage('es'); 
        };

    </script>
</body>
